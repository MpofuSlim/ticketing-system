# Local dev orchestration. Each JPA service runs against its OWN file-based
# H2 database stored in a named docker volume mounted at /app/data. Data
# survives `docker compose down` and `docker compose restart`. Use
# `docker compose down -v` to wipe everything (all H2 files + redis +
# kafka).
#
#     docker compose up --build
#     docker compose down            # stop, KEEP data
#     docker compose down -v         # stop, WIPE all volumes (DBs included)
#
# This file lives on the multi-tenant-loyalty-platform-h2 branch. The main
# branch uses a shared Postgres instance; both behaviors are preserved by
# keeping DB_URL etc. configurable via env, so flipping back to Postgres is
# a matter of overriding DB_URL/DB_DRIVER/HIBERNATE_DIALECT/FLYWAY_ENABLED.

name: innbucks

services:
  redis:
    image: redis:7-alpine
    container_name: innbucks-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Kafka in single-node KRaft mode (no Zookeeper). Used by booking-service
  # to publish domain events. Listeners: container traffic on port 9092,
  # host machine on 29092 (for poking with kafkacat / IDE consumers).
  kafka:
    image: bitnami/kafka:3.7
    container_name: innbucks-kafka
    restart: unless-stopped
    ports:
      - "29092:29092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: ticketing-user-service:dev
    container_name: innbucks-user-service
    restart: unless-stopped
    environment:
      H2_DATA_DIR: /app/data
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      JWT_EXPIRATION_MS: 86400000
    volumes:
      - user_service_data:/app/data
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    image: ticketing-event-service:dev
    container_name: innbucks-event-service
    restart: unless-stopped
    environment:
      H2_DATA_DIR: /app/data
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      SEAT_SERVICE_BASE_URL: http://seat-service:8083
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - event_service_data:/app/data
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  seat-service:
    build:
      context: .
      dockerfile: seat-service/Dockerfile
    image: ticketing-seat-service:dev
    container_name: innbucks-seat-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      H2_DATA_DIR: /app/data
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LOCK_STORE: redis
    volumes:
      - seat_service_data:/app/data
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    image: ticketing-booking-service:dev
    container_name: innbucks-booking-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      H2_DATA_DIR: /app/data
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      IDEMPOTENCY_STORE: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SEAT_SERVICE_URL: http://seat-service:8083
    volumes:
      - booking_service_data:/app/data
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  # Payment service is intentionally unimplemented for staging.
  # Start it with: docker compose --profile payments up
  payment-service:
    profiles: ["payments"]
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: ticketing-payment-service:dev
    container_name: innbucks-payment-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/data/payment_service;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.H2Dialect
    volumes:
      - payment_service_data:/app/data
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  loyalty-service:
    build:
      context: .
      dockerfile: loyalty-service/Dockerfile
    image: ticketing-loyalty-service:dev
    container_name: innbucks-loyalty-service
    restart: unless-stopped
    environment:
      H2_DATA_DIR: /app/data
      LOYALTY_VOUCHER_SECRET: ${LOYALTY_VOUCHER_SECRET:?set LOYALTY_VOUCHER_SECRET in .env (see .env.example)}
      LOYALTY_QR_SECRET: ${LOYALTY_QR_SECRET:?set LOYALTY_QR_SECRET in .env (see .env.example)}
    volumes:
      - loyalty_service_data:/app/data
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: ticketing-api-gateway:dev
    container_name: innbucks-api-gateway
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      seat-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      loyalty-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      USER_SERVICE_URI: http://user-service:8081
      EVENT_SERVICE_URI: http://event-service:8082
      SEAT_SERVICE_URI: http://seat-service:8083
      BOOKING_SERVICE_URI: http://booking-service:8084
      PAYMENT_SERVICE_URI: http://payment-service:8085
      LOYALTY_SERVICE_URI: http://loyalty-service:8086
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Redis backs the gateway's RequestRateLimiter token bucket store.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RATE_LIMIT_REPLENISH_PER_SECOND: ${RATE_LIMIT_REPLENISH_PER_SECOND:-50}
      RATE_LIMIT_BURST_CAPACITY: ${RATE_LIMIT_BURST_CAPACITY:-100}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

volumes:
  redis_data:
  kafka_data:
  user_service_data:
  event_service_data:
  seat_service_data:
  booking_service_data:
  payment_service_data:
  loyalty_service_data:
