# Local dev orchestration. Builds each service from its Dockerfile, wires them
# to a single Postgres instance (one database per service), and exposes each
# port on localhost so you can curl them directly or hit everything through
# the gateway on http://localhost:8080.
#
#     docker compose up --build
#     docker compose down            # stop
#     docker compose down -v         # stop + wipe the Postgres volume

name: innbucks

services:
  postgres:
    image: postgres:16-alpine
    container_name: innbucks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: innbucks
      POSTGRES_PASSWORD: innbucks
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innbucks"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: innbucks-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: ticketing-user-service:dev
    container_name: innbucks-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/user_service
      DB_USERNAME: innbucks
      DB_PASSWORD: innbucks
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      JWT_EXPIRATION_MS: 86400000
      EUREKA_ENABLED: "false"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    image: ticketing-event-service:dev
    container_name: innbucks-event-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/event_service
      DB_USERNAME: innbucks
      DB_PASSWORD: innbucks
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      SEAT_SERVICE_BASE_URL: http://seat-service:8083
      EUREKA_ENABLED: "false"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  seat-service:
    build:
      context: .
      dockerfile: seat-service/Dockerfile
    image: ticketing-seat-service:dev
    container_name: innbucks-seat-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/seat_service
      DB_USERNAME: innbucks
      DB_PASSWORD: innbucks
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      EUREKA_ENABLED: "false"
    # Seat locks are held in-memory; running more than one replica will cause
    # double-booking. Keep this service pinned to a single instance in staging.
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    image: ticketing-booking-service:dev
    container_name: innbucks-booking-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/booking_service
      DB_USERNAME: innbucks
      DB_PASSWORD: innbucks
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      EUREKA_ENABLED: "false"
    # Idempotency cache is held in-memory; keep this pinned to a single
    # replica in staging to avoid duplicate bookings on retry.
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  # Payment service is intentionally unimplemented for staging.
  # Start it with: docker compose --profile payments up
  payment-service:
    profiles: ["payments"]
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: ticketing-payment-service:dev
    container_name: innbucks-payment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_service
      SPRING_DATASOURCE_USERNAME: innbucks
      SPRING_DATASOURCE_PASSWORD: innbucks
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_ENABLED: "false"
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: ticketing-api-gateway:dev
    container_name: innbucks-api-gateway
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      seat-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
    environment:
      USER_SERVICE_URI: http://user-service:8081
      EVENT_SERVICE_URI: http://event-service:8082
      SEAT_SERVICE_URI: http://seat-service:8083
      BOOKING_SERVICE_URI: http://booking-service:8084
      PAYMENT_SERVICE_URI: http://payment-service:8085
      EUREKA_ENABLED: "false"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

volumes:
  postgres_data:
  redis_data:
