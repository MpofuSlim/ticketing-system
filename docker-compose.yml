name: innbucks

services:
  postgres:
    image: postgres:16-alpine
    container_name: innbucks-postgres
    restart: unless-stopped
    mem_limit: 1024m
    mem_reservation: 512m
    command:
      - "postgres"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-150}"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: innbucks-redis
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--requirepass"
      - "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}"
      - "--maxmemory"
      - "200mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.7.1
    container_name: innbucks-kafka
    restart: unless-stopped
    mem_limit: 1536m
    mem_reservation: 1024m
    ports:
      - "127.0.0.1:29092:29092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/discovery-server:${IMAGE_TAG:-dev}
    container_name: innbucks-discovery-server
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 320m
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      INNBUCKS_COUNTRY: ${INNBUCKS_COUNTRY:?set INNBUCKS_COUNTRY (see deploy/cells/cell.example.env)}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      EUREKA_INSTANCE_HOSTNAME: discovery-server
      EUREKA_PEER_URL: ",http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server-2:8761/eureka/"
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}
    ports:
      - "127.0.0.1:18761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  discovery-server-2:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/discovery-server:${IMAGE_TAG:-dev}
    container_name: innbucks-discovery-server-2
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 320m
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      INNBUCKS_COUNTRY: ${INNBUCKS_COUNTRY:?set INNBUCKS_COUNTRY (see deploy/cells/cell.example.env)}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      EUREKA_INSTANCE_HOSTNAME: discovery-server-2
      EUREKA_PEER_URL: ",http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/"
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}
    ports:
      - "127.0.0.1:18762:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/user-service:${IMAGE_TAG:-dev}
    container_name: innbucks-user-service
    restart: unless-stopped
    networks: ["default", "shared"]
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      INNBUCKS_COUNTRY: ${INNBUCKS_COUNTRY:?set INNBUCKS_COUNTRY (see deploy/cells/cell.example.env)}
      INNBUCKS_CELLS_REGISTRY: "${INNBUCKS_CELLS_REGISTRY:-{}}"
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/,http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD}@discovery-server-2:8761/eureka/
      EUREKA_PREFER_IP_ADDRESS: "false"
      EUREKA_INSTANCE_HOSTNAME: user-service
      DB_URL: jdbc:postgresql://postgres:5432/user_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      # Access-token TTL: 15 min (matches the application default). The FE
      # silently refreshes via the rotating refresh token, so a stolen/stale
      # access token is usable for at most 15 min instead of a full day.
      # (Was 86400000 = 24h.) Refresh-token TTL is unchanged (7-day default).
      JWT_EXPIRATION_MS: 900000
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      INNBUCKS_CORE_BANKING: ${INNBUCKS_CORE_BANKING:-oradian}
      ORADIAN_BASE_URL: http://oradian-middleware:8090
      ORADIAN_INTERNAL_TOKEN: ${ORADIAN_INTERNAL_TOKEN:?set ORADIAN_INTERNAL_TOKEN in .env (must match middleware INTERNAL_API_TOKEN)}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      INNBUCKS_GATEWAY_URL: ${INNBUCKS_GATEWAY_URL:-http://10.0.155.69:8088}
      WHATSAPP_GATEWAY_URL: ${WHATSAPP_GATEWAY_URL:-http://localhost:8089}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:?set WHATSAPP_API_KEY in .env}
      NATIONAL_ID_HMAC_SECRET: ${NATIONAL_ID_HMAC_SECRET:?set NATIONAL_ID_HMAC_SECRET in .env (see .env.example) — keep it stable; rotating it orphans existing hashes}
      # InnBucks notification API (system-user emails). Same creds as payment-service.
      # Optional: blank → email no-ops and falls back to SMS/WhatsApp.
      BANK_API_URL: ${BANK_API_URL:-https://staging.innbucks.co.zw}
      BANK_API_KEY: ${BANK_API_KEY:-}
      BANK_API_USERNAME: ${BANK_API_USERNAME:-}
      BANK_API_PASSWORD: ${BANK_API_PASSWORD:-}
      # Read timeout for the notify-api login (~19s real-world) and the email
      # send. Override in cell.local.env when an upstream needs more / less
      # headroom. Default lives in user-service/application.yaml (30000ms).
      BANK_API_READ_TIMEOUT_MS: ${BANK_API_READ_TIMEOUT_MS:-30000}
      # 2FA — AES-GCM key for users.mfa_secret at rest. Base64'd 32-byte value;
      # must be stable (rotating it makes every existing TOTP secret undecodable).
      # Generate one with: openssl rand -base64 32
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:?set MFA_ENCRYPTION_KEY in .env — Base64'd 32-byte value; rotating it orphans every existing TOTP secret}
      MFA_ISSUER: ${MFA_ISSUER:-InnBucks}
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/event-service:${IMAGE_TAG:-dev}
    container_name: innbucks-event-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 448m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      INNBUCKS_COUNTRY: ${INNBUCKS_COUNTRY:?set INNBUCKS_COUNTRY (see deploy/cells/cell.example.env)}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      DB_URL: jdbc:postgresql://postgres:5432/event_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      # Redis: the shared logout-token denylist (added for event-service in #314)
      # needs the cell's Redis. Without these it defaults to localhost:6379 and the
      # health check fails the container.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/,http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD}@discovery-server-2:8761/eureka/
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "127.0.0.1:8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  seat-service:
    build:
      context: .
      dockerfile: seat-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/seat-service:${IMAGE_TAG:-dev}
    container_name: innbucks-seat-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 448m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      INNBUCKS_COUNTRY: ${INNBUCKS_COUNTRY:?set INNBUCKS_COUNTRY (see deploy/cells/cell.example.env)}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/,http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD}@discovery-server-2:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/seat_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      LOCK_STORE: redis
    ports:
      - "127.0.0.1:8083:8083"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/booking-service:${IMAGE_TAG:-dev}
    container_name: innbucks-booking-service
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      INNBUCKS_COUNTRY: ${INNBUCKS_COUNTRY:?set INNBUCKS_COUNTRY (see deploy/cells/cell.example.env)}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      DB_URL: jdbc:postgresql://postgres:5432/booking_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      IDEMPOTENCY_STORE: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/,http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD}@discovery-server-2:8761/eureka/
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      WHATSAPP_GATEWAY_URL: ${WHATSAPP_GATEWAY_URL:-http://localhost:8089}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:?set WHATSAPP_API_KEY in .env}
      INNBUCKS_GATEWAY_URL: ${INNBUCKS_GATEWAY_URL:-http://10.0.155.69:8088}
      TICKETS_PUBLIC_BASE_URL: ${TICKETS_PUBLIC_BASE_URL:-http://localhost:8080}
      # Platform->organizer commission invoicing (all optional; safe defaults in
      # application.yaml). Rates are percentages. INVOICE_VAT_RATE is per-country.
      INVOICE_DEFAULT_COMMISSION_RATE: ${INVOICE_DEFAULT_COMMISSION_RATE:-10.0}
      INVOICE_VAT_RATE: ${INVOICE_VAT_RATE:-15.0}
      INVOICE_DEFAULT_BILLING_CYCLE: ${INVOICE_DEFAULT_BILLING_CYCLE:-MONTHLY}
      INVOICE_DUE_DAYS: ${INVOICE_DUE_DAYS:-14}
      INVOICE_SCHEDULER_ENABLED: ${INVOICE_SCHEDULER_ENABLED:-true}
      # InnBucks notification API (booking-confirm email). Same creds as payment-service.
      # Optional: blank → email no-ops and the WhatsApp QR remains the delivery channel.
      BANK_API_URL: ${BANK_API_URL:-https://staging.innbucks.co.zw}
      BANK_API_KEY: ${BANK_API_KEY:-}
      BANK_API_USERNAME: ${BANK_API_USERNAME:-}
      BANK_API_PASSWORD: ${BANK_API_PASSWORD:-}
    ports:
      - "127.0.0.1:8084:8084"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/payment-service:${IMAGE_TAG:-dev}
    container_name: innbucks-payment-service
    restart: unless-stopped
    networks: ["default", "shared"]
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      INNBUCKS_COUNTRY: ${INNBUCKS_COUNTRY:?set INNBUCKS_COUNTRY (see deploy/cells/cell.example.env)}
      INNBUCKS_CURRENCY: ${INNBUCKS_CURRENCY:-USD}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      DB_URL: jdbc:postgresql://postgres:5432/payment_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      JPA_DDL_AUTO: validate
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      IDEMPOTENCY_STORE: redis
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/,http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD}@discovery-server-2:8761/eureka/
      EUREKA_PREFER_IP_ADDRESS: "false"
      EUREKA_INSTANCE_HOSTNAME: payment-service
      ORADIAN_MIDDLEWARE_URL: http://oradian-middleware:8090
      ORADIAN_INTERNAL_TOKEN: ${ORADIAN_INTERNAL_TOKEN:?set ORADIAN_INTERNAL_TOKEN in .env (must match middleware INTERNAL_API_TOKEN)}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      WHATSAPP_GATEWAY_URL: ${WHATSAPP_GATEWAY_URL:-http://localhost:8089}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:?set WHATSAPP_API_KEY in .env}
      BANK_API_URL: ${BANK_API_URL:-https://staging.innbucks.co.zw}
      BANK_API_KEY: ${BANK_API_KEY:?set BANK_API_KEY in .env}
      BANK_API_USERNAME: ${BANK_API_USERNAME:?set BANK_API_USERNAME in .env}
      BANK_API_PASSWORD: ${BANK_API_PASSWORD:?set BANK_API_PASSWORD in .env}
      PAYMENTS_INNBUCKS_ENABLED: ${PAYMENTS_INNBUCKS_ENABLED:-true}
      PAYMENTS_INNBUCKS_MERCHANT_ACCOUNT: ${PAYMENTS_INNBUCKS_MERCHANT_ACCOUNT:-}
    ports:
      - "127.0.0.1:8085:8085"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  loyalty-service:
    build:
      context: .
      dockerfile: loyalty-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/loyalty-service:${IMAGE_TAG:-dev}
    container_name: innbucks-loyalty-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 448m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      INNBUCKS_COUNTRY: ${INNBUCKS_COUNTRY:?set INNBUCKS_COUNTRY (see deploy/cells/cell.example.env)}
      INNBUCKS_CURRENCY: ${INNBUCKS_CURRENCY:-USD}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/,http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD}@discovery-server-2:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/loyalty_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      # Redis: the shared logout-token denylist (added for loyalty-service in #314)
      # needs the cell's Redis. Without these it defaults to localhost:6379 and the
      # health check fails the container.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      LOYALTY_VOUCHER_SECRET: ${LOYALTY_VOUCHER_SECRET:?set LOYALTY_VOUCHER_SECRET in .env (see .env.example)}
      LOYALTY_QR_SECRET: ${LOYALTY_QR_SECRET:?set LOYALTY_QR_SECRET in .env (see .env.example)}
    ports:
      - "127.0.0.1:8086:8086"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/api-gateway:${IMAGE_TAG:-dev}
    container_name: innbucks-api-gateway
    restart: unless-stopped
    networks: ["default", "shared"]
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      INNBUCKS_COUNTRY: ${INNBUCKS_COUNTRY:?set INNBUCKS_COUNTRY (see deploy/cells/cell.example.env)}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/,http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD}@discovery-server-2:8761/eureka/
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      RATE_LIMIT_REPLENISH_PER_SECOND: ${RATE_LIMIT_REPLENISH_PER_SECOND:-50}
      RATE_LIMIT_BURST_CAPACITY: ${RATE_LIMIT_BURST_CAPACITY:-100}
      # HTTP Basic login for the aggregated Swagger UI. Leave SWAGGER_PASSWORD
      # unset to keep Swagger open (a startup warning is logged); set it to
      # require a login. Username defaults to "admin".
      SWAGGER_USER: ${SWAGGER_USER:-admin}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:-}
    ports:
      - "18080:8080"
      - "127.0.0.1:19090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  default:
    name: innbucks-internal
    driver: bridge
  shared:
    name: innbucks-shared
    external: true
