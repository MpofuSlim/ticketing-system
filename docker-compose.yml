# Compose spec used for BOTH local dev and EC2 prod.
#
#   Local dev:  docker compose up --build
#                Compose builds each service from its Dockerfile and tags
#                the result with the `image:` value below using whatever
#                IMAGE_TAG resolves to (defaults to `dev`). Local laptop
#                gets `ghcr.io/.../<service>:dev` images.
#
#   EC2 prod:   IMAGE_TAG=sha-<commit> docker compose pull
#               IMAGE_TAG=sha-<commit> docker compose up -d --no-build
#                EC2 never builds — it pulls the exact image GHCR
#                published for that commit. `:dev` and `:latest` are
#                local-convenience tags and MUST NOT be used in prod.
#
# Image tags are owned by the Release workflow (.github/workflows/release.yml).
# Rollback: ssh in and run `~/superApp/scripts/deploy.sh <previous-sha>`.
#
# Logging + resources (staging hardening):
#   * SPRING_PROFILES_ACTIVE defaults to `prod,json`. `prod` activates the
#     ProductionSecretsGuard; `json` switches logback to Logstash-encoded JSON
#     (one object per line) so Loki/ELK/CloudWatch can ingest structured logs.
#     Keep `json` in the list for any deployed environment — drop it only for
#     local human-readable tailing.
#   * Every JVM service sets JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=70.0 plus a
#     mem_limit. The percentage is OF the mem_limit, so the two MUST be tuned
#     together: without a limit a JVM sizes its heap to a fraction of the whole
#     ~16GB host and the co-located services OOM-kill each other (this box runs
#     both stacks + Postgres/Redis/Kafka with NO swap). The limits below sum to
#     ~8GB; raise a service if you see it OOMKilled, lower them for a smaller box.

name: innbucks

services:
  postgres:
    image: postgres:16-alpine
    container_name: innbucks-postgres
    restart: unless-stopped
    mem_limit: 1024m
    mem_reservation: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: innbucks-redis
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Kafka in single-node KRaft mode (no Zookeeper). Used by booking-service
  # to publish domain events. Listeners: container traffic on port 9092,
  # host machine on 29092 (for poking with kafkacat / IDE consumers).
  kafka:
    image: bitnami/kafka:3.7
    container_name: innbucks-kafka
    restart: unless-stopped
    mem_limit: 1536m
    mem_reservation: 1024m
    ports:
      - "29092:29092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Eureka service registry. Every service registers here on boot and resolves
  # siblings by name; the api-gateway resolves its lb:// route targets the same
  # way. Started first (others depend_on it healthy) so first registration
  # succeeds promptly.
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/discovery-server:${IMAGE_TAG:-dev}
    container_name: innbucks-discovery-server
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 320m
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      # Self-zone hostname so the registry advertises itself on the shared
      # network as discovery-server (not its container id).
      EUREKA_INSTANCE_HOSTNAME: discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/user-service:${IMAGE_TAG:-dev}
    container_name: innbucks-user-service
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Activates ProductionSecretsGuard which refuses to boot if any
      # sensitive secret still holds its `change-me-*` placeholder.
      # Override per-environment in .env to relax (e.g. `dev` for local).
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/user_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      JWT_EXPIRATION_MS: 86400000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Oradian middleware lives in the sibling stack on the shared
      # innbucks-shared docker network — reachable by service name.
      ORADIAN_BASE_URL: http://oradian-middleware:8090
      # X-Internal-Token sent to the middleware on every S2S call.
      # MUST equal the middleware's INTERNAL_API_TOKEN env var, otherwise
      # the middleware rejects with 401 invalid_internal_token.
      ORADIAN_INTERNAL_TOKEN: ${ORADIAN_INTERNAL_TOKEN:?set ORADIAN_INTERNAL_TOKEN in .env (must match middleware INTERNAL_API_TOKEN)}
      # Shared secret between ticketing's own services (loyalty webhooks).
      # Separate concern from ORADIAN_INTERNAL_TOKEN; can be a different value.
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      # External WhatsApp notification gateway (OTP + approval delivery).
      # Override the URL per environment (the application.yaml default is a dev
      # ngrok tunnel that rotates); the api key is a required secret.
      WHATSAPP_GATEWAY_URL: ${WHATSAPP_GATEWAY_URL:-https://maximum-implicitly-treefrog.ngrok-free.app}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:?set WHATSAPP_API_KEY in .env}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/event-service:${IMAGE_TAG:-dev}
    container_name: innbucks-event-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 448m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      DB_URL: jdbc:postgresql://postgres:5432/event_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      # Required from booking-service on PATCH /events/{id}/availability/consume.
      # Must match INTERNAL_API_TOKEN on the booking-service side.
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  seat-service:
    build:
      context: .
      dockerfile: seat-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/seat-service:${IMAGE_TAG:-dev}
    container_name: innbucks-seat-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 448m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/seat_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LOCK_STORE: redis
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/booking-service:${IMAGE_TAG:-dev}
    container_name: innbucks-booking-service
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      DB_URL: jdbc:postgresql://postgres:5432/booking_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      IDEMPOTENCY_STORE: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      # Presented to event-service on the internal availability/consume call.
      # Must match INTERNAL_API_TOKEN on the event-service side.
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  # Dummy payment-service: POST /payments confirms the matching booking via
  # booking-service so the booking journey can complete end-to-end. No real
  # processor — every call "succeeds" if booking-service accepts the confirm.
  # Start with: docker compose --profile payments up
  payment-service:
    profiles: ["payments"]
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/payment-service:${IMAGE_TAG:-dev}
    container_name: innbucks-payment-service
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      DB_URL: jdbc:postgresql://postgres:5432/payment_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      # Flyway owns the schema; Hibernate must NOT mutate it at boot.
      # Every other service in this stack uses `validate`; payment-service
      # was the odd one out — letting it silently drift the staging DB.
      JPA_DDL_AUTO: validate
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      # Redis backs the velocity counter (TransferLimitService) AND the
      # cross-pod Idempotency-Key replay cache (IDEMPOTENCY_STORE=redis).
      # Without it the counter fails closed — rejecting every transfer — and
      # idempotency would be per-pod, so a retry landing on another replica
      # could execute a second real transfer.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      IDEMPOTENCY_STORE: redis
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      # Oradian middleware lives in the sibling stack on the shared
      # innbucks-shared docker network — reachable by service name.
      # payment-service uses ORADIAN_MIDDLEWARE_URL (different env var
      # name from user-service's ORADIAN_BASE_URL).
      ORADIAN_MIDDLEWARE_URL: http://oradian-middleware:8090
      # X-Internal-Token sent to the middleware. MUST equal the
      # middleware's INTERNAL_API_TOKEN env var.
      ORADIAN_INTERNAL_TOKEN: ${ORADIAN_INTERNAL_TOKEN:?set ORADIAN_INTERNAL_TOKEN in .env (must match middleware INTERNAL_API_TOKEN)}
      # Shared secret between ticketing's own services (loyalty webhooks).
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      # External WhatsApp notification gateway (payment confirmations). Override
      # the URL per environment (the application.yaml default is a dev ngrok
      # tunnel that rotates); the api key is a required secret.
      WHATSAPP_GATEWAY_URL: ${WHATSAPP_GATEWAY_URL:-https://maximum-implicitly-treefrog.ngrok-free.app}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:?set WHATSAPP_API_KEY in .env}
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  loyalty-service:
    build:
      context: .
      dockerfile: loyalty-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/loyalty-service:${IMAGE_TAG:-dev}
    container_name: innbucks-loyalty-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 448m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/loyalty_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      # Inbound shared secret validated on /loyalty/internal/** webhooks
      # (caller is ticketing's other services). Must equal the
      # INTERNAL_API_TOKEN the callers send.
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/api-gateway:${IMAGE_TAG:-dev}
    container_name: innbucks-api-gateway
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      seat-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      loyalty-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Redis backs the gateway's RequestRateLimiter token bucket store.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RATE_LIMIT_REPLENISH_PER_SECOND: ${RATE_LIMIT_REPLENISH_PER_SECOND:-50}
      RATE_LIMIT_BURST_CAPACITY: ${RATE_LIMIT_BURST_CAPACITY:-100}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

volumes:
  postgres_data:
  redis_data:
  kafka_data:

# Shared with the OradianMiddleware stack (deployed separately on the
# same EC2). Both stacks join this network so user-service /
# payment-service can reach the middleware as `http://oradian-middleware:8090`
# instead of dialing localhost (which inside a container points at the
# container itself). The deploy workflow creates this network on the
# EC2 if missing — idempotent.
networks:
  default:
    name: innbucks-shared
    external: true
