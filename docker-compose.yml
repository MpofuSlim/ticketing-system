# Compose spec used for BOTH local dev and EC2 prod.
#
#   Local dev:  docker compose up --build
#                Compose builds each service from its Dockerfile and tags
#                the result with the `image:` value below using whatever
#                IMAGE_TAG resolves to (defaults to `dev`). Local laptop
#                gets `ghcr.io/.../<service>:dev` images.
#
#   EC2 prod:   IMAGE_TAG=sha-<commit> docker compose pull
#               IMAGE_TAG=sha-<commit> docker compose up -d --no-build
#                EC2 never builds — it pulls the exact image GHCR
#                published for that commit. `:dev` and `:latest` are
#                local-convenience tags and MUST NOT be used in prod.
#
# Image tags are owned by the Release workflow (.github/workflows/release.yml).
# Rollback: ssh in and run `~/superApp/scripts/deploy.sh <previous-sha>`.
#
# Logging + resources (staging hardening):
#   * SPRING_PROFILES_ACTIVE defaults to `prod,json`. `prod` activates the
#     ProductionSecretsGuard; `json` switches logback to Logstash-encoded JSON
#     (one object per line) so Loki/ELK/CloudWatch can ingest structured logs.
#     Keep `json` in the list for any deployed environment — drop it only for
#     local human-readable tailing.
#   * Every JVM service sets JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=70.0 plus a
#     mem_limit. The percentage is OF the mem_limit, so the two MUST be tuned
#     together: without a limit a JVM sizes its heap to a fraction of the whole
#     ~16GB host and the co-located services OOM-kill each other (this box runs
#     both stacks + Postgres/Redis/Kafka with NO swap). The limits below sum to
#     ~8GB; raise a service if you see it OOMKilled, lower them for a smaller box.
#
# Port exposure (staging hardening):
#   Only the api-gateway (18080) publishes on all interfaces — it is the single
#   public entry point. Every other published port is bound to 127.0.0.1, so the
#   services, Postgres, Redis and Kafka are reachable only from the EC2 host
#   itself (host-local debugging) and over the shared docker network — never from
#   the box's public interface. Inter-service traffic uses the docker network
#   (Eureka lb://), so loopback binding does not affect it. Put TLS + auth in
#   front of 8080 (ingress / reverse proxy) before exposing staging publicly.

name: innbucks

services:
  postgres:
    image: postgres:16-alpine
    container_name: innbucks-postgres
    restart: unless-stopped
    mem_limit: 1024m
    mem_reservation: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: innbucks-redis
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    # maxmemory + allkeys-lru: bound Redis to ~200 MB (well inside the 256 MB
    # mem_limit so we don't OOM-kill on a memory-pressure spike) and evict the
    # least-recently-used key when full. Without this, every distinct bearer
    # token spawns its own rate-limiter bucket (and the gateway's velocity-counter
    # + seat-lock keys add to the pool) — under a botnet that creates many
    # accounts, Redis would OOM in 1-2 days and take the gateway down with it.
    # appendonly:yes -> AOF persistence; persistence and eviction can co-exist.
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--requirepass"
      - "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}"
      - "--maxmemory"
      - "200mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Kafka in single-node KRaft mode (no Zookeeper). Used by booking-service
  # to publish domain events. Listeners: container traffic on port 9092,
  # host machine on 29092 (for poking with kafkacat / IDE consumers).
  #
  # Uses the official apache/kafka image: Bitnami removed their public
  # versioned tags from Docker Hub (Aug 2025 catalog change), so
  # bitnami/kafka:3.7 no longer resolves. The official image uses KAFKA_*
  # env vars (no _CFG_ infix) and stores data under /var/lib/kafka/data.
  kafka:
    image: apache/kafka:3.7.1
    container_name: innbucks-kafka
    restart: unless-stopped
    mem_limit: 1536m
    mem_reservation: 1024m
    ports:
      - "127.0.0.1:29092:29092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Eureka service registry. Every service registers here on boot and resolves
  # siblings by name; the api-gateway resolves its lb:// route targets the same
  # way. Started first (others depend_on it healthy) so first registration
  # succeeds promptly.
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/discovery-server:${IMAGE_TAG:-dev}
    container_name: innbucks-discovery-server
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 320m
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      # Tracing: OFF by default. Set TRACING_ENABLED=true + OTLP_ENDPOINT to an
      # external OTel collector (none is bundled in this stack) to export spans.
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      # Self-zone hostname so the registry advertises itself on the shared
      # network as discovery-server (not its container id).
      EUREKA_INSTANCE_HOSTNAME: discovery-server
      # Registry Basic-auth credential (enforced under the prod profile). Clients
      # embed it in their eureka defaultZone URL, so use a URL-safe value
      # (openssl rand -hex 24) — '@' / ':' / '/' would break URL parsing.
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}
    ports:
      - "127.0.0.1:18761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/user-service:${IMAGE_TAG:-dev}
    container_name: innbucks-user-service
    restart: unless-stopped
    # internal (DB/Redis/Eureka/siblings) + shared (only to reach oradian-middleware:8090).
    networks: ["default", "shared"]
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Activates ProductionSecretsGuard which refuses to boot if any
      # sensitive secret still holds its `change-me-*` placeholder.
      # Override per-environment in .env to relax (e.g. `dev` for local).
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      # Tracing: OFF by default. Set TRACING_ENABLED=true + OTLP_ENDPOINT to an
      # external OTel collector (none is bundled in this stack) to export spans.
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/
      # Dual-homed (default + shared) -> register by service name, not a single
      # fixed IP, so Docker DNS resolves it per-network for every caller. See
      # the eureka.instance comment in user-service application.yaml.
      EUREKA_PREFER_IP_ADDRESS: "false"
      EUREKA_INSTANCE_HOSTNAME: user-service
      DB_URL: jdbc:postgresql://postgres:5432/user_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      JWT_EXPIRATION_MS: 86400000
      # First-run super-admin bootstrap. Leave UNSET to skip seeding — under the
      # prod profile the service refuses to create a known-credential admin
      # (the old hardcoded default was a backdoor). Set a strong, unique value
      # to bootstrap the first admin; it is forced to change password on first login.
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Per-cell core-banking provider behind CoreBankingPort. Default
      # `oradian` = current behaviour; the ZW cell env flips this to `veengu`
      # once that adapter lands (phase 2 of the provider split). KE stays
      # `oradian` permanently.
      INNBUCKS_CORE_BANKING: ${INNBUCKS_CORE_BANKING:-oradian}
      # Oradian middleware lives in the sibling stack on the shared
      # innbucks-shared docker network — reachable by service name.
      ORADIAN_BASE_URL: http://oradian-middleware:8090
      # X-Internal-Token sent to the middleware on every S2S call.
      # MUST equal the middleware's INTERNAL_API_TOKEN env var, otherwise
      # the middleware rejects with 401 invalid_internal_token.
      ORADIAN_INTERNAL_TOKEN: ${ORADIAN_INTERNAL_TOKEN:?set ORADIAN_INTERNAL_TOKEN in .env (must match middleware INTERNAL_API_TOKEN)}
      # Shared secret between ticketing's own services (loyalty webhooks).
      # Separate concern from ORADIAN_INTERNAL_TOKEN; can be a different value.
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      # InnBucks core gateway adapter (SMS via messenger-interface, payments via
      # veengu-integration). Host-resident jar on port 8088 — Docker containers
      # reach it via the EC2 private IP. Override INNBUCKS_GATEWAY_URL in .env
      # if the host IP differs (e.g. 172.17.0.1 on Docker-Desktop setups).
      INNBUCKS_GATEWAY_URL: ${INNBUCKS_GATEWAY_URL:-http://10.0.155.69:8088}
      # External WhatsApp notification gateway (OTP + approval delivery).
      # Override the URL per environment (the application.yaml default is a dev
      # ngrok tunnel that rotates); the api key is a required secret.
      WHATSAPP_GATEWAY_URL: ${WHATSAPP_GATEWAY_URL:-https://maximum-implicitly-treefrog.ngrok-free.app}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:?set WHATSAPP_API_KEY in .env}
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/event-service:${IMAGE_TAG:-dev}
    container_name: innbucks-event-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 448m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      # Tracing: OFF by default. Set TRACING_ENABLED=true + OTLP_ENDPOINT to an
      # external OTel collector (none is bundled in this stack) to export spans.
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      DB_URL: jdbc:postgresql://postgres:5432/event_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      # Required from booking-service on PATCH /events/{id}/availability/consume.
      # Must match INTERNAL_API_TOKEN on the booking-service side.
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "127.0.0.1:8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  seat-service:
    build:
      context: .
      dockerfile: seat-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/seat-service:${IMAGE_TAG:-dev}
    container_name: innbucks-seat-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 448m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      # Tracing: OFF by default. Set TRACING_ENABLED=true + OTLP_ENDPOINT to an
      # external OTel collector (none is bundled in this stack) to export spans.
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/seat_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      LOCK_STORE: redis
    ports:
      - "127.0.0.1:8083:8083"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/booking-service:${IMAGE_TAG:-dev}
    container_name: innbucks-booking-service
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      # Tracing: OFF by default. Set TRACING_ENABLED=true + OTLP_ENDPOINT to an
      # external OTel collector (none is bundled in this stack) to export spans.
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      DB_URL: jdbc:postgresql://postgres:5432/booking_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      IDEMPOTENCY_STORE: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/
      # Presented to event-service on the internal availability/consume call.
      # Must match INTERNAL_API_TOKEN on the event-service side.
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      # WhatsApp + InnBucks-core gateways used by BookingConfirmedNotificationListener
      # to deliver booking-confirm notifications (WhatsApp primary, SMS fallback).
      # Same env vars user-service and payment-service already consume.
      WHATSAPP_GATEWAY_URL: ${WHATSAPP_GATEWAY_URL:-https://maximum-implicitly-treefrog.ngrok-free.app}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:?set WHATSAPP_API_KEY in .env}
      INNBUCKS_GATEWAY_URL: ${INNBUCKS_GATEWAY_URL:-http://10.0.155.69:8088}
      # Public gateway origin where the hosted ticket QR + view page are
      # reachable — used to build absolute links/images in the confirmation
      # email + WhatsApp. MUST be your public api-gateway URL in prod.
      TICKETS_PUBLIC_BASE_URL: ${TICKETS_PUBLIC_BASE_URL:-http://localhost:8080}
    ports:
      - "127.0.0.1:8084:8084"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  # payment-service: real money movement.
  #
  #   - POST /payments (ticket purchase): REAL InnBucks wallet debit via the
  #     public Bank API (BANK_API_* below), with the hardened payment ledger
  #     (IN_DOUBT + inquiry-based reconciliation). Same FE contract as the
  #     old stub — the FE never changed.
  #   - Wallet transfers / withdrawals via Oradian middleware
  #     (TransfersController + OradianMiddlewareClient with Retry +
  #     CircuitBreaker, PENDING/SUCCEEDED/FAILED ledger in transactions
  #     table, Redis idempotency-key replay cache, Kafka event publication,
  #     ReconciliationJob safety net).
  #   - Shop loyalty checkout — real points debit/credit via loyalty-service.
  #
  # NOT optional: this service is part of the default stack. (Used to live
  # behind a "payments" docker compose profile when it was a pure dummy;
  # the profile was removed so `docker compose up -d` brings it up with
  # the rest of the fleet.)
  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/payment-service:${IMAGE_TAG:-dev}
    container_name: innbucks-payment-service
    restart: unless-stopped
    # internal (DB/Redis/Eureka/siblings) + shared (only to reach oradian-middleware:8090).
    networks: ["default", "shared"]
    mem_limit: 768m
    mem_reservation: 512m
    depends_on:
      discovery-server:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      # Tracing: OFF by default. Set TRACING_ENABLED=true + OTLP_ENDPOINT to an
      # external OTel collector (none is bundled in this stack) to export spans.
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      DB_URL: jdbc:postgresql://postgres:5432/payment_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      # Flyway owns the schema; Hibernate must NOT mutate it at boot.
      # Every other service in this stack uses `validate`; payment-service
      # was the odd one out — letting it silently drift the staging DB.
      JPA_DDL_AUTO: validate
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      # Redis backs the velocity counter (TransferLimitService) AND the
      # cross-pod Idempotency-Key replay cache (IDEMPOTENCY_STORE=redis).
      # Without it the counter fails closed — rejecting every transfer — and
      # idempotency would be per-pod, so a retry landing on another replica
      # could execute a second real transfer.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      IDEMPOTENCY_STORE: redis
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/
      # Dual-homed (default + shared) -> register by service name, not a single
      # fixed IP, so Docker DNS resolves it per-network for every caller. See
      # the eureka.instance comment in payment-service application.yaml.
      EUREKA_PREFER_IP_ADDRESS: "false"
      EUREKA_INSTANCE_HOSTNAME: payment-service
      # Oradian middleware lives in the sibling stack on the shared
      # innbucks-shared docker network — reachable by service name.
      # payment-service uses ORADIAN_MIDDLEWARE_URL (different env var
      # name from user-service's ORADIAN_BASE_URL).
      ORADIAN_MIDDLEWARE_URL: http://oradian-middleware:8090
      # X-Internal-Token sent to the middleware. MUST equal the
      # middleware's INTERNAL_API_TOKEN env var.
      ORADIAN_INTERNAL_TOKEN: ${ORADIAN_INTERNAL_TOKEN:?set ORADIAN_INTERNAL_TOKEN in .env (must match middleware INTERNAL_API_TOKEN)}
      # Shared secret between ticketing's own services (loyalty webhooks).
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      # External WhatsApp notification gateway (payment-code delivery +
      # payment confirmations). Override the URL per environment (the
      # application.yaml default is a dev ngrok tunnel that rotates); the api
      # key is a required secret.
      WHATSAPP_GATEWAY_URL: ${WHATSAPP_GATEWAY_URL:-https://maximum-implicitly-treefrog.ngrok-free.app}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:?set WHATSAPP_API_KEY in .env}
      # Public InnBucks Merchant API — ticket payments (POST /payments) issue
      # a 2D PAYMENT code the customer approves in their own InnBucks app;
      # no server-side debit, no out-of-band code delivery (the FE renders
      # the code + QR from the response). All three credentials are secrets
      # from .env and must belong to a MERCHANT-type API client allowed to
      # generate PAYMENT codes. (Env names kept from the bank-api round —
      # same platform creds.)
      BANK_API_URL: ${BANK_API_URL:-https://staging.innbucks.co.zw}
      BANK_API_KEY: ${BANK_API_KEY:?set BANK_API_KEY in .env}
      BANK_API_USERNAME: ${BANK_API_USERNAME:?set BANK_API_USERNAME in .env}
      BANK_API_PASSWORD: ${BANK_API_PASSWORD:?set BANK_API_PASSWORD in .env}
      PAYMENTS_INNBUCKS_ENABLED: ${PAYMENTS_INNBUCKS_ENABLED:-true}
    ports:
      - "127.0.0.1:8085:8085"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  loyalty-service:
    build:
      context: .
      dockerfile: loyalty-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/loyalty-service:${IMAGE_TAG:-dev}
    container_name: innbucks-loyalty-service
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 448m
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      # Tracing: OFF by default. Set TRACING_ENABLED=true + OTLP_ENDPOINT to an
      # external OTel collector (none is bundled in this stack) to export spans.
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/
      DB_URL: jdbc:postgresql://postgres:5432/loyalty_service
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (see .env.example)}
      DB_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      # Inbound shared secret validated on /loyalty/internal/** webhooks
      # (caller is ticketing's other services). Must equal the
      # INTERNAL_API_TOKEN the callers send.
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in .env}
      # Loyalty voucher/QR signing secrets. The prod profile's
      # ProductionSecretsGuard refuses to boot while these hold their
      # change-me placeholder defaults, so they must be supplied here.
      LOYALTY_VOUCHER_SECRET: ${LOYALTY_VOUCHER_SECRET:?set LOYALTY_VOUCHER_SECRET in .env (see .env.example)}
      LOYALTY_QR_SECRET: ${LOYALTY_QR_SECRET:?set LOYALTY_QR_SECRET in .env (see .env.example)}
    ports:
      - "127.0.0.1:8086:8086"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-mpofuslim}/api-gateway:${IMAGE_TAG:-dev}
    container_name: innbucks-api-gateway
    restart: unless-stopped
    # Also join `shared`: user-service / payment-service are dual-homed and
    # advertise their shared-network IP to Eureka, so the gateway must be on
    # `shared` to route to them (otherwise /auth/** etc. time out connecting).
    networks: ["default", "shared"]
    mem_limit: 768m
    mem_reservation: 512m
    # The gateway only needs the registry + its rate-limit store to boot; it
    # resolves backends dynamically via Eureka (lb://) and returns 503 for any
    # not-yet-registered service. Depending on every backend's health let a
    # single unhealthy backend (e.g. loyalty) block the whole entry point.
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,json}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70.0}
      # Tracing: OFF by default. Set TRACING_ENABLED=true + OTLP_ENDPOINT to an
      # external OTel collector (none is bundled in this stack) to export spans.
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      EUREKA_SERVER_URL: http://${EUREKA_USERNAME:-eureka}:${EUREKA_PASSWORD:?set EUREKA_PASSWORD in .env (see .env.example)}@discovery-server:8761/eureka/
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Redis backs the gateway's RequestRateLimiter token bucket store.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (see .env.example)}
      RATE_LIMIT_REPLENISH_PER_SECOND: ${RATE_LIMIT_REPLENISH_PER_SECOND:-50}
      RATE_LIMIT_BURST_CAPACITY: ${RATE_LIMIT_BURST_CAPACITY:-100}
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 45s

volumes:
  postgres_data:
  redis_data:
  kafka_data:

# Shared with the OradianMiddleware stack (deployed separately on the
# same EC2). Both stacks join this network so user-service /
# payment-service can reach the middleware as `http://oradian-middleware:8090`
# instead of dialing localhost (which inside a container points at the
# container itself). The deploy workflow creates this network on the
# EC2 if missing — idempotent.
networks:
  # Ticketing-internal network — NOT shared with the OradianMiddleware stack.
  # Postgres / Redis / Kafka / Eureka and every service live here. It is a normal
  # bridge (egress allowed, so services can still reach the external WhatsApp
  # gateway), but the OradianMiddleware stack — and anything else on
  # innbucks-shared — can no longer reach the data / registry tier (audit CR-2/H1/H2).
  default:
    name: innbucks-internal
    driver: bridge
  # Cross-stack bridge. ONLY user-service + payment-service join this, so they
  # can reach the Oradian middleware (oradian-middleware:8090). The middleware
  # joins it from its own stack; the deploy workflow creates it if missing.
  shared:
    name: innbucks-shared
    external: true
