spring:
  application:
    name: seat-service

  # Local dev: run `docker compose up -d postgres redis` first; the seed
  # in docker/postgres/init-databases.sql creates seat_service with the
  # default credentials below. Tests override these to in-memory H2 via
  # src/test/resources/application-test.yaml + @ActiveProfiles("test").
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/seat_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:innbucks}
    password: ${DB_PASSWORD:innbucks}
    hikari:
      pool-name: seat-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate validates entities against it.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  lock:
    # Set to "redis" for shared, cross-replica locks. Defaults to in-memory so
    # local dev and tests work without a running Redis.
    store: ${LOCK_STORE:memory}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8083
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"