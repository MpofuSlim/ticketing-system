spring:
  application:
    name: seat-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/seat_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: seat-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: false
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  lock:
    store: ${LOCK_STORE:redis}
  seat-lock-reaper:
    enabled: ${SEAT_LOCK_REAPER_ENABLED:true}
    interval-ms: ${SEAT_LOCK_REAPER_INTERVAL_MS:60000}
    initial-delay-ms: ${SEAT_LOCK_REAPER_INITIAL_DELAY_MS:30000}
    batch-size: ${SEAT_LOCK_REAPER_BATCH_SIZE:200}

booking-service:
  base-url: http://booking-service
  connect-timeout-ms: ${BOOKING_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${BOOKING_SERVICE_READ_TIMEOUT_MS:5000}

user-service:
  base-url: http://user-service
  connect-timeout-ms: ${USER_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${USER_SERVICE_READ_TIMEOUT_MS:5000}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  # OWASP A02 stage-1 RS256/JWKS dual-verify. When JWT_PUBLIC_KEY is set this
  # service verifies BOTH HS256 and RS256 tokens (alg selected per-token); unset
  # = HS256 only, as before. Set fleet-wide BEFORE user-service flips to RS256
  # minting. PKCS#8/X.509 PEM (-----BEGIN PUBLIC KEY-----).
  public-key: ${JWT_PUBLIC_KEY:}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8083
  shutdown: graceful
  # Never leak internals to clients on the fallback /error path (stack traces,
  # raw exception messages, binding-error detail). Handled errors already return
  # the ApiResult envelope via GlobalExceptionHandler — incl. field-level
  # validation detail — so this only sanitises the unhandled fallthrough.
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

innbucks:
  country: ${INNBUCKS_COUNTRY:ZW}
  # A01: shared fleet secret used to call booking-service's internal
  # /bookings/internal/categories/active-counts for live availability. Same
  # INTERNAL_API_TOKEN as booking/event-service; guarded by ProductionSecretsGuard.
  internal-api-token: ${INTERNAL_API_TOKEN:change-me-internal-token-change-me-internal-token}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{country:-},%X{homeCountry:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"

---
# OWASP A05: backends serve no Swagger/OpenAPI in a deployed cell — the
# gateway hosts the only (auth-gated, fail-closed) copy. Gated on prod; dev/test
# keep docs on for local use.
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
