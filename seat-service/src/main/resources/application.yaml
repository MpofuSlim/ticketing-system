spring:
  application:
    name: seat-service

  # H2 file mode: schema and data persist on disk under ./data so restarts
  # don't wipe state. The PostgreSQL config is preserved below (commented)
  # for easy reversal.
  datasource:
    url: jdbc:h2:file:./data/seat_service;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # --- PostgreSQL (disabled) ---
    # url: ${DB_URL:jdbc:postgresql://localhost:5432/seat_service}
    # driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    # username: ${DB_USERNAME:postgres}
    # password: ${DB_PASSWORD}
    hikari:
      pool-name: seat-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # H2 file-mode: persist schema and data across restarts. Override with
      # JPA_DDL_AUTO=create-drop to wipe on each boot.
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        # --- PostgreSQL dialect (disabled) ---
        # dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  # Flyway migrations are PostgreSQL-flavoured; disabled when running on H2.
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  lock:
    # Set to "redis" for shared, cross-replica locks. Defaults to in-memory so
    # local dev and tests work without a running Redis.
    store: ${LOCK_STORE:memory}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8083
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"