spring:
  application:
    name: seat-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/seat_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: seat-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # Schema is owned by Flyway migrations; Hibernate only validates that
      # the JPA model matches the actual columns at boot.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Redis is used for distributed seat-locks only; we don't have any
      # @RedisHash-annotated entities. Without this flag Spring Data Redis
      # tries to classify every Repository<> bean (SeatRepository, etc.) as
      # a potential Redis repository and logs a noisy INFO warning on each.
      repositories:
        enabled: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  lock:
    # Set to "redis" for shared, cross-replica locks. Defaults to in-memory so
    # local dev and tests work without a running Redis.
    store: ${LOCK_STORE:memory}

# booking-service is queried by the analytics endpoint
# (GET /seat-categories/{id}/analytics) to enrich the response with who-bought-
# what data. Configured as an explicit URL because we don't run service
# discovery. Failures are tolerated — analytics still returns category + seat
# stats, with bookingServiceReachable=false in the payload.
booking-service:
  base-url: ${BOOKING_SERVICE_URL:http://localhost:8084}
  connect-timeout-ms: ${BOOKING_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${BOOKING_SERVICE_READ_TIMEOUT_MS:5000}

# user-service is queried by the @MinTier interceptor so the registration tier
# always matches the system of record (instead of trusting the JWT's possibly
# stale tier claim).
user-service:
  base-url: ${USER_SERVICE_URL:http://localhost:8081}
  connect-timeout-ms: ${USER_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${USER_SERVICE_READ_TIMEOUT_MS:5000}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8083
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  # Distributed tracing via OTel. Sampling defaults to 10% — flip to 1.0 for
  # debug sessions, leave low in prod for cost. OTLP_ENDPOINT points at the
  # OTel collector / Tempo / Jaeger; default localhost is fine for laptop
  # docker-compose, override in k8s. Set TRACING_ENABLED=false to disable
  # entirely (no spans recorded, no exporter calls).
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}


logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
cors:
  # Comma-separated list of allowed origin patterns. Default whitelists the
  # production frontend (innvents.vercel.app), Vercel preview deploys, and
  # any localhost port for dev. Override in prod via CORS_ALLOWED_ORIGINS.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://innvents.vercel.app,https://innbucks-ticketing.vercel.app,https://*.vercel.app,http://localhost:[*]}
