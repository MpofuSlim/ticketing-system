spring:
  datasource:
    url: jdbc:h2:mem:booking_service_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  # Flyway migrations are PostgreSQL-flavoured; Hibernate generates the
  # schema against H2 in tests, so Flyway must be off here.
  flyway:
    enabled: false
  cloud:
    discovery:
      enabled: false

seat-service:
  url: http://localhost:0

# Tests don't talk to Kafka. localhost:0 satisfies KafkaProducerConfig's
# bootstrap-servers @Value at context load; nothing actually sends.
spring.kafka.bootstrap-servers: localhost:0

jwt:
  secret: test-test-test-test-test-test-test-test
  expiration: 3600000

app:
  idempotency:
    store: memory
  events:
    booking-created-topic: booking.created
    booking-confirmed-topic: booking.confirmed
    booking-cancelled-topic: booking.cancelled

# Tests use a stubbed BookingEventPublisher; no Kafka broker required.
# Spring's auto-configured KafkaTemplate is replaced by a Mockito mock in
# the application context (see BookingServiceTest configuration).
