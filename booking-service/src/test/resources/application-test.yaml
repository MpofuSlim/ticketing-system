spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///booking_service_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    discovery:
      enabled: false

seat-service:
  url: http://localhost:0

spring.kafka.bootstrap-servers: localhost:0

jwt:
  secret: test-test-test-test-test-test-test-test
  expiration: 3600000

app:
  idempotency:
    store: memory
  events:
    booking-created-topic: booking.created
    booking-confirmed-topic: booking.confirmed
    booking-cancelled-topic: booking.cancelled
