spring:
  # All tests run against real PostgreSQL via Testcontainers (jdbc:tc: URL,
  # ContainerDatabaseDriver) — no H2. Flyway runs the real migrations;
  # Hibernate validates against them. Requires Docker (CI has it).
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///booking_service_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    discovery:
      enabled: false

seat-service:
  url: http://localhost:0

# Tests don't talk to Kafka. localhost:0 satisfies KafkaProducerConfig's
# bootstrap-servers @Value at context load; nothing actually sends.
spring.kafka.bootstrap-servers: localhost:0

jwt:
  secret: test-test-test-test-test-test-test-test
  expiration: 3600000

app:
  idempotency:
    store: memory
  events:
    booking-created-topic: booking.created
    booking-confirmed-topic: booking.confirmed
    booking-cancelled-topic: booking.cancelled

# Tests use a stubbed BookingEventPublisher; no Kafka broker required.
# Spring's auto-configured KafkaTemplate is replaced by a Mockito mock in
# the application context (see BookingServiceTest configuration).
