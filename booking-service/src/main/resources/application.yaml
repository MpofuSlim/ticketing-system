spring:
  application:
    name: booking-service

  # Local dev: run `docker compose up -d postgres redis` first; the seed
  # in docker/postgres/init-databases.sql creates booking_service with
  # the default credentials below. Tests override these to in-memory H2
  # via src/test/resources/application-test.yaml + @ActiveProfiles("test").
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booking_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:innbucks}
    password: ${DB_PASSWORD:innbucks}
    hikari:
      pool-name: booking-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate validates entities against it.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  cloud:
    openfeign:
      # Wraps every Feign call in a Spring Cloud Circuit Breaker (Resilience4j
      # impl, configured below). Required for @FeignClient(fallback = ...) to
      # actually run.
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connect-timeout: ${FEIGN_CONNECT_TIMEOUT_MS:2000}
            read-timeout: ${FEIGN_READ_TIMEOUT_MS:5000}
            logger-level: basic

# Resilience4j configuration. The instance name MUST match the Feign client
# class name (SeatServiceClient) — that's the convention Spring Cloud uses
# when it wraps a Feign call in a CircuitBreaker.
resilience4j:
  circuitbreaker:
    instances:
      SeatServiceClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50            # open if ≥50% of last 10 calls fail
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      SeatServiceClient:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException

app:
  idempotency:
    # Set to "redis" for shared idempotency across replicas. Defaults to
    # in-memory so local dev and unit tests work without Redis.
    store: ${IDEMPOTENCY_STORE:memory}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

server:
  port: 8084
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"