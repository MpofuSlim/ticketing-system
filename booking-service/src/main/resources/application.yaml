spring:
  application:
    name: booking-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booking_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: booking-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # Schema is owned by Flyway migrations; Hibernate only validates that
      # the JPA model matches the actual columns at boot.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: false
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # Redis is used for idempotency keys and caching only; we don't have any
      # @RedisHash-annotated entities. Without this flag Spring Data Redis
      # tries to classify every Repository<> bean (BookingRepository, etc.) as
      # a potential Redis repository and logs a noisy INFO warning on each.
      repositories:
        enabled: false

  # KafkaProducerConfig builds the producer factory + template from this
  # property. Boot 4 no longer auto-configures Kafka, so spring.kafka.*
  # subkeys are not consumed automatically. The default targets the EXTERNAL
  # listener exposed by docker-compose (localhost:29092 → kafka:9092 inside
  # the network) so booking-service running on the host can talk to a
  # docker-compose Kafka without further config. Inside Docker the compose
  # file overrides this to kafka:9092.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  cloud:
    discovery:
      # Eureka client is wired (see the eureka: block below); each
      # @FeignClient(name = "...") resolves its target by service name through
      # the registry instead of a hardcoded url.
      enabled: true
    openfeign:
      # Wraps every Feign call in a Spring Cloud Circuit Breaker (Resilience4j
      # impl, configured below). Required for @FeignClient(fallback = ...) to
      # actually run.
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connect-timeout: ${FEIGN_CONNECT_TIMEOUT_MS:2000}
            read-timeout: ${FEIGN_READ_TIMEOUT_MS:5000}
            logger-level: basic
          # Per-client tighter timeouts for best-effort hot-path calls.
          # BookingController's pre-resolve tier lookup (user-service) and
          # BookingService.createBooking's tenant lookup (event-service)
          # both have safe fallbacks — GUEST_TIER and a null tenantId
          # respectively — so a healthy call returns in <50ms and a
          # degraded upstream should fail FAST rather than stall the
          # booking for 5s on the global default. Without this, every
          # booking pays the upstream's slowest response (observed
          # ~1.3s end-to-end with event-service mid-degradation) and a
          # single Tomcat worker is pinned for that duration, capping
          # throughput at (workers / per-call latency).
          UserServiceClient:
            connect-timeout: ${USER_FEIGN_CONNECT_TIMEOUT_MS:300}
            read-timeout: ${USER_FEIGN_READ_TIMEOUT_MS:300}
          EventServiceClient:
            connect-timeout: ${EVENT_FEIGN_CONNECT_TIMEOUT_MS:300}
            read-timeout: ${EVENT_FEIGN_READ_TIMEOUT_MS:300}

# Resilience4j configuration. The instance name MUST match the Feign client
# class name (SeatServiceClient) — that's the convention Spring Cloud uses
# when it wraps a Feign call in a CircuitBreaker.
resilience4j:
  circuitbreaker:
    instances:
      SeatServiceClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50            # open if ≥50% of last 10 calls fail
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      LoyaltyServiceClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      EventServiceClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      SeatServiceClient:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
      LoyaltyServiceClient:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
      EventServiceClient:
        max-attempts: 2
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException

# Inter-service targets are resolved from the Eureka registry by the name in
# each @FeignClient(name = "..."), so no explicit URLs are configured here any
# more. The loyalty / event / seat calls are still wrapped in Resilience4j
# circuit breakers (see below) so an outage degrades gracefully: cash bookings
# still work, redeem fails fast.
innbucks:
  # Public origin (through the api-gateway) where the hosted ticket QR + view
  # page are reachable. Used to build ABSOLUTE links in the confirmation email
  # (<img src>) and WhatsApp/SMS. MUST be the public gateway URL in prod, e.g.
  # https://api.yourdomain.com — a localhost default only works for local dev.
  tickets:
    public-base-url: ${TICKETS_PUBLIC_BASE_URL:http://localhost:8080}
  # Multi-cell country pin. Every running JVM is anchored to a single InnBucks
  # market — startup refuses to boot with an unknown value (see CountryMdcConfig).
  # Default ZW because the current deployment is the Zimbabwe home market;
  # cell #2 onwards MUST set INNBUCKS_COUNTRY explicitly per deployment.
  country: ${INNBUCKS_COUNTRY:ZW}
  # Shared secret presented to event-service on the internal PATCH
  # /events/{id}/availability/consume call. Same env var as everywhere
  # else in the ticketing stack; ProductionSecretsGuard refuses the
  # `change-me-*` placeholder when SPRING_PROFILES_ACTIVE=prod.
  # NOTE: this placeholder default MUST be byte-identical across every
  # service (user/event/seat/booking/payment/loyalty). It's the only thing
  # that lets S2S calls authenticate in a dev/staging run with no
  # INTERNAL_API_TOKEN env var set. A divergent default = silent 401 on
  # cross-service calls (e.g. payment->booking confirm, booking->loyalty).
  internal-api-token: ${INTERNAL_API_TOKEN:change-me-internal-token-change-me-internal-token}

  # Ticket-scan per-event assignment check. When a TEAM_MEMBER scans, booking-
  # service asks user-service whether they're assigned to the event. If
  # user-service is unreachable mid-scan, fail-open=false (default) DENIES the
  # scan (NOT_ASSIGNED_TO_EVENT) until user-service is back — a restricted team
  # member is never silently widened to the organizer's whole event set, and
  # this matches the LIST path, which already fails closed. Set true ONLY as a
  # deliberate break-glass for an outage at the gate (it re-opens that gap).
  scan:
    assignment-check:
      fail-open: ${SCAN_ASSIGNMENT_CHECK_FAIL_OPEN:false}

# External WhatsApp notification gateway used by BookingConfirmedNotificationListener
# to deliver booking-confirm notifications. Third-party service (not in Eureka),
# so a plain RestClient with an explicit URL. Same WHATSAPP_* env-var convention
# as user-service and payment-service so all three read the same gateway config.
whatsapp:
  base-url: ${WHATSAPP_GATEWAY_URL:https://maximum-implicitly-treefrog.ngrok-free.app}
  api-key: ${WHATSAPP_API_KEY:change-me-whatsapp-api-key}
  connect-timeout-ms: ${WHATSAPP_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${WHATSAPP_READ_TIMEOUT_MS:10000}

# InnBucks core gateway adapter, used by the SMS fallback path on booking
# confirm. Host-resident service, not in Eureka — reached via explicit URL.
# Same INNBUCKS_GATEWAY_URL convention as user-service.
innbucks-gateway:
  base-url: ${INNBUCKS_GATEWAY_URL:http://localhost:8088}
  connect-timeout-ms: ${INNBUCKS_GATEWAY_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${INNBUCKS_GATEWAY_READ_TIMEOUT_MS:10000}

app:
  booking:
    # How long a PENDING booking holds its seats before the expiration
    # scheduler auto-cancels it. Set to 5 minutes by default — matches
    # seat-service's 5-min lock TTL.
    hold-ttl-minutes: ${BOOKING_HOLD_TTL_MINUTES:5}
    # How often the expiration scheduler scans for PENDING bookings whose
    # hold has lapsed. 30s lag on a 5-min TTL is invisible to users; lower
    # if you want tighter timing, raise to ease DB load. Tune with ShedLock
    # when running multiple replicas (avoids duplicate work per tick).
    expiration-poll-interval-ms: ${BOOKING_EXPIRATION_POLL_MS:30000}
  idempotency:
    # Set to "redis" for shared idempotency across replicas. Defaults to
    # in-memory so local dev and unit tests work without Redis.
    store: ${IDEMPOTENCY_STORE:memory}
  events:
    # Domain event topics. Override these to wire onto an existing event
    # bus / shared topic naming scheme.
    booking-created-topic: ${BOOKING_CREATED_TOPIC:booking.created}
    booking-confirmed-topic: ${BOOKING_CONFIRMED_TOPIC:booking.confirmed}
    booking-cancelled-topic: ${BOOKING_CANCELLED_TOPIC:booking.cancelled}
  event-outbox:
    # OutboxEventDrainer — how many rows it pulls per tick and how many
    # attempts before flipping a row to giving_up. Keys also referenced
    # from OutboxEventDrainer's @Value defaults; listing them here makes
    # them discoverable.
    batch-size: ${EVENT_OUTBOX_BATCH_SIZE:200}
    max-attempts: ${EVENT_OUTBOX_MAX_ATTEMPTS:10}
    interval-ms: ${EVENT_OUTBOX_INTERVAL_MS:5000}
    initial-delay-ms: ${EVENT_OUTBOX_INITIAL_DELAY_MS:10000}
    purge:
      # OutboxEventPurgeJob deletes 'published' rows older than `retention`
      # every `interval-ms`. Default: hourly, 7-day retention, 1k rows per
      # batch. `pending` and `giving_up` rows are never touched. Set
      # interval-ms to a very large number to effectively disable the job
      # (the @Scheduled annotation requires a positive value).
      retention: ${EVENT_OUTBOX_PURGE_RETENTION:P7D}
      batch-size: ${EVENT_OUTBOX_PURGE_BATCH_SIZE:1000}
      interval-ms: ${EVENT_OUTBOX_PURGE_INTERVAL_MS:3600000}
      initial-delay-ms: ${EVENT_OUTBOX_PURGE_INITIAL_DELAY_MS:60000}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8084
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

# Service discovery — register with the Eureka registry (discovery-server) and
# resolve sibling services by name. EUREKA_SERVER_URL points at the registry;
# the default targets a local standalone server for laptop dev.
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    # Register by IP — a container's own hostname isn't resolvable by its
    # peers on the shared network. The unique instance-id keeps replicas
    # from colliding in the registry.
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  # Distributed tracing via OTel. Sampling defaults to 10% — flip to 1.0 for
  # debug sessions, leave low in prod for cost. OTLP_ENDPOINT points at the
  # OTel collector / Tempo / Jaeger; default localhost is fine for laptop
  # docker-compose, override in k8s. Set TRACING_ENABLED=false to disable
  # entirely (no spans recorded, no exporter calls).
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}


logging:
  # Log pattern carries two country tags:
  #   country     — deployment pin (CountryMdcConfig, every request)
  #   homeCountry — customer's JWT routing claim (JwtFilter, authenticated requests)
  # A mismatch between the two (post step 7 edge routing) is a wrong-cell signal.
  pattern:
    level: "%5p [${spring.application.name:-},%X{country:-},%X{homeCountry:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
# CORS is configured exclusively on the api-gateway (per PR #182 + the per-service
# CORS removal). Don't reintroduce a `cors:` block here without first reverting
# the gateway's RemoveResponseHeader filter — see SecurityConfig for the rationale.
