spring:
  application:
    name: booking-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booking_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: booking-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: false
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  cloud:
    discovery:
      enabled: true
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connect-timeout: ${FEIGN_CONNECT_TIMEOUT_MS:2000}
            read-timeout: ${FEIGN_READ_TIMEOUT_MS:5000}
            logger-level: basic
          UserServiceClient:
            connect-timeout: ${USER_FEIGN_CONNECT_TIMEOUT_MS:300}
            read-timeout: ${USER_FEIGN_READ_TIMEOUT_MS:300}
          EventServiceClient:
            connect-timeout: ${EVENT_FEIGN_CONNECT_TIMEOUT_MS:300}
            read-timeout: ${EVENT_FEIGN_READ_TIMEOUT_MS:300}

resilience4j:
  circuitbreaker:
    instances:
      SeatServiceClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      LoyaltyServiceClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      EventServiceClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      SeatServiceClient:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
      LoyaltyServiceClient:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
      EventServiceClient:
        max-attempts: 2
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException

innbucks:
  tickets:
    public-base-url: ${TICKETS_PUBLIC_BASE_URL:http://localhost:8080}
  country: ${INNBUCKS_COUNTRY:ZW}
  internal-api-token: ${INTERNAL_API_TOKEN:change-me-internal-token-change-me-internal-token}

  scan:
    assignment-check:
      fail-open: ${SCAN_ASSIGNMENT_CHECK_FAIL_OPEN:false}

whatsapp:
  base-url: ${WHATSAPP_GATEWAY_URL:http://localhost:8089}
  api-key: ${WHATSAPP_API_KEY:change-me-whatsapp-api-key}
  connect-timeout-ms: ${WHATSAPP_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${WHATSAPP_READ_TIMEOUT_MS:10000}

# InnBucks public notification API (email). Same API Gateway + BANK_API_*
# credentials as the payment rail (POST /auth/third-party for the bearer,
# X-Api-Key header). Email body is plain text {subject,message,reference,
# destinationEmail}.
innbucks-notify:
  base-url: ${BANK_API_URL:https://staging.innbucks.co.zw}
  api-key: ${BANK_API_KEY:}
  username: ${BANK_API_USERNAME:}
  password: ${BANK_API_PASSWORD:}
  connect-timeout-ms: ${BANK_API_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${BANK_API_READ_TIMEOUT_MS:20000}
  token-ttl: ${BANK_API_TOKEN_TTL:PT8M}

app:
  booking:
    hold-ttl-minutes: ${BOOKING_HOLD_TTL_MINUTES:5}
    expiration-poll-interval-ms: ${BOOKING_EXPIRATION_POLL_MS:30000}
  idempotency:
    store: ${IDEMPOTENCY_STORE:memory}
  events:
    booking-created-topic: ${BOOKING_CREATED_TOPIC:booking.created}
    booking-confirmed-topic: ${BOOKING_CONFIRMED_TOPIC:booking.confirmed}
    booking-cancelled-topic: ${BOOKING_CANCELLED_TOPIC:booking.cancelled}
  event-outbox:
    batch-size: ${EVENT_OUTBOX_BATCH_SIZE:200}
    max-attempts: ${EVENT_OUTBOX_MAX_ATTEMPTS:10}
    interval-ms: ${EVENT_OUTBOX_INTERVAL_MS:5000}
    initial-delay-ms: ${EVENT_OUTBOX_INITIAL_DELAY_MS:10000}
    purge:
      retention: ${EVENT_OUTBOX_PURGE_RETENTION:P7D}
      batch-size: ${EVENT_OUTBOX_PURGE_BATCH_SIZE:1000}
      interval-ms: ${EVENT_OUTBOX_PURGE_INTERVAL_MS:3600000}
      initial-delay-ms: ${EVENT_OUTBOX_PURGE_INITIAL_DELAY_MS:60000}
  # Platform -> event-organizer commission invoicing. Rates are percentages
  # (10.0 = 10%); both are snapshotted onto every invoice at generation. The
  # generation + overdue jobs are ShedLock-guarded and run in the small hours UTC.
  invoicing:
    default-commission-rate: ${INVOICE_DEFAULT_COMMISSION_RATE:10.0}
    vat-rate: ${INVOICE_VAT_RATE:15.0}
    default-billing-cycle: ${INVOICE_DEFAULT_BILLING_CYCLE:MONTHLY}
    due-days: ${INVOICE_DUE_DAYS:14}
    scheduler-enabled: ${INVOICE_SCHEDULER_ENABLED:true}
    generation-cron: ${INVOICE_GENERATION_CRON:0 30 1 * * *}
    overdue-cron: ${INVOICE_OVERDUE_CRON:0 0 2 * * *}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8084
  shutdown: graceful
  # Never leak internals to clients on the fallback /error path (stack traces,
  # raw exception messages, binding-error detail). Handled errors already return
  # the ApiResult envelope via GlobalExceptionHandler — incl. field-level
  # validation detail — so this only sanitises the unhandled fallthrough.
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{country:-},%X{homeCountry:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"

---
# OWASP A05: backends serve no Swagger/OpenAPI in a deployed cell — the
# gateway hosts the only (auth-gated, fail-closed) copy. Gated on prod; dev/test
# keep docs on for local use.
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
