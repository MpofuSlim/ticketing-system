spring:
  application:
    name: booking-service

  # H2-only mode: file-based database under ./data so writes survive restart;
  # AUTO_SERVER=TRUE lets a SQL client connect while the app is running. The
  # PostgreSQL config is preserved below (commented) for easy reversal.
  datasource:
    url: jdbc:h2:file:./data/booking-service;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # --- PostgreSQL (disabled) ---
    # url: ${DB_URL:jdbc:postgresql://localhost:5432/booking_service}
    # driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    # username: ${DB_USERNAME:postgres}
    # password: ${DB_PASSWORD}
    hikari:
      pool-name: booking-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # H2 in-memory: Hibernate generates the schema on each boot.
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        # --- PostgreSQL dialect (disabled) ---
        # dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  # Flyway migrations are PostgreSQL-flavoured; disabled when running on H2.
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Redis is used for idempotency keys and caching only; we don't have any
      # @RedisHash-annotated entities. Without this flag Spring Data Redis
      # tries to classify every Repository<> bean (BookingRepository, etc.) as
      # a potential Redis repository and logs a noisy INFO warning on each.
      repositories:
        enabled: false

  # KafkaProducerConfig builds the producer factory + template from this
  # property. Boot 4 no longer auto-configures Kafka, so spring.kafka.*
  # subkeys are not consumed automatically. The default targets the EXTERNAL
  # listener exposed by docker-compose (localhost:29092 → kafka:9092 inside
  # the network) so booking-service running on the host can talk to a
  # docker-compose Kafka without further config. Inside Docker the compose
  # file overrides this to kafka:9092.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  h2:
    console:
      enabled: true
      path: /h2-console

  cloud:
    discovery:
      # No Eureka or other discovery client wired; Feign uses explicit URLs.
      enabled: false
    openfeign:
      # Wraps every Feign call in a Spring Cloud Circuit Breaker (Resilience4j
      # impl, configured below). Required for @FeignClient(fallback = ...) to
      # actually run.
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connect-timeout: ${FEIGN_CONNECT_TIMEOUT_MS:2000}
            read-timeout: ${FEIGN_READ_TIMEOUT_MS:5000}
            logger-level: basic

# Resilience4j configuration. The instance name MUST match the Feign client
# class name (SeatServiceClient) — that's the convention Spring Cloud uses
# when it wraps a Feign call in a CircuitBreaker.
resilience4j:
  circuitbreaker:
    instances:
      SeatServiceClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50            # open if ≥50% of last 10 calls fail
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      SeatServiceClient:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException

seat-service:
  # Explicit URL (no service discovery). docker-compose sets this to
  # http://seat-service:8083 via SEAT_SERVICE_URL.
  url: ${SEAT_SERVICE_URL:http://localhost:8083}

app:
  booking:
    # How long a PENDING booking holds its seats before the expiration
    # scheduler auto-cancels it. Set to 5 minutes by default — matches
    # seat-service's 5-min lock TTL.
    hold-ttl-minutes: ${BOOKING_HOLD_TTL_MINUTES:5}
    # How often the expiration scheduler scans for PENDING bookings whose
    # hold has lapsed. 30s lag on a 5-min TTL is invisible to users; lower
    # if you want tighter timing, raise to ease DB load. Tune with ShedLock
    # when running multiple replicas (avoids duplicate work per tick).
    expiration-poll-interval-ms: ${BOOKING_EXPIRATION_POLL_MS:30000}
  idempotency:
    # Set to "redis" for shared idempotency across replicas. Defaults to
    # in-memory so local dev and unit tests work without Redis.
    store: ${IDEMPOTENCY_STORE:memory}
  events:
    # Domain event topics. Override these to wire onto an existing event
    # bus / shared topic naming scheme.
    booking-created-topic: ${BOOKING_CREATED_TOPIC:booking.created}
    booking-confirmed-topic: ${BOOKING_CONFIRMED_TOPIC:booking.confirmed}
    booking-cancelled-topic: ${BOOKING_CANCELLED_TOPIC:booking.cancelled}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8084
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"