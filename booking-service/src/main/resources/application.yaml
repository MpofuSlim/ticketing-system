spring:
  application:
    name: booking-service

  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/booking_service_db;AUTO_SERVER=TRUE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    hikari:
      pool-name: booking-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: ${FEIGN_CONNECT_TIMEOUT_MS:2000}
            read-timeout: ${FEIGN_READ_TIMEOUT_MS:5000}
            logger-level: basic

app:
  idempotency:
    # Set to "redis" for shared idempotency across replicas. Defaults to
    # in-memory so local dev and unit tests work without Redis.
    store: ${IDEMPOTENCY_STORE:memory}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

server:
  port: 8084
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    # The Redis auto-configuration registers a reactive health indicator that
    # pings Redis on every probe. Keep it off when the idempotency store is
    # in-memory; flip on alongside IDEMPOTENCY_STORE=redis.
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"