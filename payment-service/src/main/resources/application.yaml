spring:
  application:
    name: payment-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: payment-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # Schema is owned by Flyway migrations (src/main/resources/db/migration);
      # Hibernate only validates the JPA model matches the actual columns at boot.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: false
    locations: classpath:db/migration

  # Kafka producer bootstrap. The rest of the producer config (acks=all,
  # idempotence, JSON value serializer) lives in KafkaProducerConfig.java
  # because Spring Boot's defaults aren't right for money-movement events.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  # Redis backs the atomic daily-velocity counter in TransferLimitService.
  # Without this flag Spring Data Redis classifies every JpaRepository<>
  # bean as a Redis repository and warns about misconfiguration; we have
  # no @RedisHash entities so disabling auto-config of redis repositories
  # silences the warning and keeps boot fast.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

# booking-service is called by POST /payments to flip the matching booking
# from PENDING to CONFIRMED. Default targets host:8084 for local dev; docker-
# compose overrides to http://booking-service:8084 inside the network.
booking-service:
  # Resolved from the Eureka registry by name (the client is @LoadBalanced).
  base-url: http://booking-service
  connect-timeout-ms: ${BOOKING_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${BOOKING_SERVICE_READ_TIMEOUT_MS:5000}

# loyalty-service is called by POST /payments/shop-checkout to run the earn
# (cash → PURCHASE) and/or burn (points → REDEMPTION) legs of a shop payment.
# Direct pod-to-pod (gateway blocks /loyalty/internal/**); the shared secret
# below must match loyalty-service's innbucks.internal-api-token.
loyalty-service:
  # Resolved from the Eureka registry by name (the client is @LoadBalanced).
  base-url: http://loyalty-service
  connect-timeout-ms: ${LOYALTY_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${LOYALTY_SERVICE_READ_TIMEOUT_MS:5000}

# Oradian middleware is called for deposit-account lookups (ownership checks
# on POST /payments/transfer) and to forward the actual deposit-account transfer.
# Direct pod-to-pod; the shared secret below must match Oradian middleware's
# innbucks.internal-api.token. It is a DIFFERENT secret from
# innbucks.internal-api-token (loyalty-service shared secret) — keep them
# split so rotating one doesn't break the other. Same env var name as
# user-service uses (ORADIAN_INTERNAL_TOKEN) so a single value configures
# every service that talks to Oradian middleware.
oradian-middleware:
  base-url: ${ORADIAN_MIDDLEWARE_URL:http://localhost:8090}
  internal-token: ${ORADIAN_INTERNAL_TOKEN:change-me-internal-token-change-me-internal-token}
  connect-timeout-ms: ${ORADIAN_MIDDLEWARE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${ORADIAN_MIDDLEWARE_READ_TIMEOUT_MS:10000}

# External WhatsApp notification gateway — sends the customer a payment
# confirmation after a transaction commits SUCCEEDED (see
# PaymentNotificationListener). Third-party service, not in Eureka, so a plain
# RestClient with an explicit URL. base-url default is a dev ngrok tunnel —
# override WHATSAPP_GATEWAY_URL per environment (ngrok URLs rotate). api-key is
# a secret: set WHATSAPP_API_KEY (ProductionSecretsGuard rejects the change-me
# placeholder under prod).
whatsapp:
  base-url: ${WHATSAPP_GATEWAY_URL:https://maximum-implicitly-treefrog.ngrok-free.app}
  api-key: ${WHATSAPP_API_KEY:change-me-whatsapp-api-key}
  connect-timeout-ms: ${WHATSAPP_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${WHATSAPP_READ_TIMEOUT_MS:10000}

innbucks:
  internal-api-token: ${INTERNAL_API_TOKEN:change-me-internal-token-change-me-internal-token}
  # Velocity caps on POST /payments/transfer + /payments/withdraw.
  # Per-transaction max caps a single request; per-day max caps the sum
  # of today's PENDING + SUCCEEDED rows on the same source account plus
  # the new amount (calendar-day semantics, server timezone). Defaults
  # are placeholders — override per deployment / regulator. Real-world
  # caps should vary by KYC tier, account type, and country; that's
  # follow-up work, this is the flat-cap v1.
  transfer-limits:
    per-transaction-max: ${PER_TX_LIMIT:100000}
    per-day-max: ${PER_DAY_LIMIT:500000}

# Reconciliation job (ReconciliationJob) surfaces ledger rows stuck in
# PENDING longer than the threshold so operators can spot drift before
# it accumulates silently. Defaults: scan every minute, flag anything
# PENDING for > 5 minutes, max 100 rows per scan (next scan picks up
# the rest if the page was full).
payment-service:
  reconciliation:
    scan-interval: ${RECONCILIATION_SCAN_INTERVAL:PT1M}
    stale-pending-threshold: ${RECONCILIATION_STALE_THRESHOLD:PT5M}
    batch-size: ${RECONCILIATION_BATCH_SIZE:100}
  # Topic provisioning. Spring auto-creates from the NewTopic @Bean if
  # the broker allows it; replication-factor of 1 is dev-only — bump to
  # 3 in any environment with multiple brokers.
  kafka:
    transaction-completed:
      partitions: ${PAYMENT_TX_TOPIC_PARTITIONS:3}
      replicas: ${PAYMENT_TX_TOPIC_REPLICAS:1}

# Idempotency-Key replay cache backing store.
#   redis  — shared across pods; an Idempotency-Key replay is honored even when
#            the retry lands on a different replica or after a restart. Set in
#            docker-compose for staging/prod (reuses the velocity-counter Redis).
#   memory — per-pod ConcurrentHashMap; only safe for single-instance dev/tests.
# Defaults to memory so local dev and tests need no Redis.
app:
  idempotency:
    store: ${IDEMPOTENCY_STORE:memory}

# Verify-only JWT secret. payment-service does NOT mint tokens — user-service
# is the issuer. This must match user-service's jwt.secret exactly; tokens
# signed by user-service are validated here for the authenticated
# POST /payments/transfer endpoint (the only one that decodes a bearer JWT).
jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}

# Resilience4j wrap around the Oradian middleware client. Two failure
# modes drove this: (a) a single TCP blip to Oradian became a customer-
# facing 502 and a wasted FAILED ledger row, (b) a sustained Oradian
# outage parked every customer's request on the read-timeout (~10s)
# before failing, exhausting the request thread pool. Retry handles (a);
# CircuitBreaker handles (b).
#
# Retry kicks in only on OradianMiddlewareTransientException (5xx from
# upstream / network errors / empty body). 4xx rejections — validation,
# insufficient funds, account suspended — are thrown as the plain
# OradianMiddlewareException so they propagate immediately without
# burning retry budget on a request Oradian has already definitively
# refused.
resilience4j:
  retry:
    instances:
      oradian-middleware:
        max-attempts: 3
        wait-duration: 500ms
        # Exponential backoff: 500ms, 1s, 2s between attempts. Caps the
        # total customer-facing wait at ~3.5s before we surface a 502.
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - innbucks.paymentservice.client.OradianMiddlewareTransientException
  circuitbreaker:
    instances:
      oradian-middleware:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        # Wait for some traffic before evaluating the rate — keeps the
        # breaker from tripping on the first two failures after a
        # cold start.
        minimum-number-of-calls: 5
        failure-rate-threshold: 50          # open if ≥50% of last 20 calls fail
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        # Same retry-exceptions list — only transient failures should
        # count toward tripping the breaker. A 4xx VALIDATION storm
        # is a customer-side problem, not an upstream-down signal.
        record-exceptions:
          - innbucks.paymentservice.client.OradianMiddlewareTransientException

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8085
  shutdown: graceful
  # Defence-in-depth: never serialize stack traces / binding errors / spring
  # framework messages into the /error response body. GlobalExceptionHandler
  # handles every controller exception explicitly; these settings make sure
  # anything that slips past it (e.g. errors thrown by a Filter before the
  # advice runs) still doesn't leak internals to the client.
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

# Service discovery — register with the Eureka registry (discovery-server) and
# resolve ticketing siblings (booking-, loyalty-service) by name. The external
# Oradian middleware is NOT registered and keeps its explicit URL.
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    # Register by IP — a container's own hostname isn't resolvable by its
    # peers on the shared network. The unique instance-id keeps replicas
    # from colliding in the registry.
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  # Distributed tracing via OTel. Sampling defaults to 10% — flip to 1.0 for
  # debug sessions, leave low in prod for cost. OTLP_ENDPOINT points at the
  # OTel collector / Tempo / Jaeger; default localhost is fine for laptop
  # docker-compose, override in k8s. Set TRACING_ENABLED=false to disable
  # entirely (no spans recorded, no exporter calls).
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}


logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"

cors:
  # Comma-separated list of allowed origin patterns. Default whitelists the
  # production frontend (innvents.vercel.app), and
  # any localhost port for dev. Override in prod via CORS_ALLOWED_ORIGINS.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://innvents.vercel.app,https://innbucks-ticketing.vercel.app,http://localhost:[*]}
