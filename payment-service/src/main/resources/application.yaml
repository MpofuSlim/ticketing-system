spring:
  application:
    name: payment-service
  lifecycle:
    timeout-per-shutdown-phase: 30s

# booking-service is called by POST /payments to flip the matching booking
# from PENDING to CONFIRMED. Default targets host:8084 for local dev; docker-
# compose overrides to http://booking-service:8084 inside the network.
booking-service:
  base-url: ${BOOKING_SERVICE_URL:http://localhost:8084}
  connect-timeout-ms: ${BOOKING_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${BOOKING_SERVICE_READ_TIMEOUT_MS:5000}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8085
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"

cors:
  # Comma-separated list of allowed origin patterns. Default whitelists the
  # production frontend (innvents.vercel.app), Vercel preview deploys, and
  # any localhost port for dev. Override in prod via CORS_ALLOWED_ORIGINS.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://innvents.vercel.app,https://innbucks-ticketing.vercel.app,https://*.vercel.app,http://localhost:[*]}
