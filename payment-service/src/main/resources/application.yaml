spring:
  application:
    name: payment-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: payment-service-pool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # Matches the other services: schema lives outside Hibernate (Flyway when
      # entities are added; today, an empty schema is fine). 'validate' is a no-op
      # when there are no entities and prevents silent schema drift the moment
      # JPA models start landing here.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  lifecycle:
    timeout-per-shutdown-phase: 30s

# booking-service is called by POST /payments to flip the matching booking
# from PENDING to CONFIRMED. Default targets host:8084 for local dev; docker-
# compose overrides to http://booking-service:8084 inside the network.
booking-service:
  base-url: ${BOOKING_SERVICE_URL:http://localhost:8084}
  connect-timeout-ms: ${BOOKING_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${BOOKING_SERVICE_READ_TIMEOUT_MS:5000}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8085
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"

cors:
  # Comma-separated list of allowed origin patterns. Default whitelists the
  # production frontend (innvents.vercel.app), Vercel preview deploys, and
  # any localhost port for dev. Override in prod via CORS_ALLOWED_ORIGINS.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://innvents.vercel.app,https://innbucks-ticketing.vercel.app,https://*.vercel.app,http://localhost:[*]}
