spring:
  application:
    name: payment-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: payment-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: false
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

booking-service:
  base-url: http://booking-service
  connect-timeout-ms: ${BOOKING_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${BOOKING_SERVICE_READ_TIMEOUT_MS:5000}

loyalty-service:
  base-url: http://loyalty-service
  connect-timeout-ms: ${LOYALTY_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${LOYALTY_SERVICE_READ_TIMEOUT_MS:5000}

oradian-middleware:
  base-url: ${ORADIAN_MIDDLEWARE_URL:http://localhost:8090}
  internal-token: ${ORADIAN_INTERNAL_TOKEN:change-me-internal-token-change-me-internal-token}
  connect-timeout-ms: ${ORADIAN_MIDDLEWARE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${ORADIAN_MIDDLEWARE_READ_TIMEOUT_MS:10000}

whatsapp:
  base-url: ${WHATSAPP_GATEWAY_URL:http://localhost:8089}
  api-key: ${WHATSAPP_API_KEY:change-me-whatsapp-api-key}
  connect-timeout-ms: ${WHATSAPP_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${WHATSAPP_READ_TIMEOUT_MS:10000}

innbucks:
  country: ${INNBUCKS_COUNTRY:ZW}
  currency: ${INNBUCKS_CURRENCY:USD}
  internal-api-token: ${INTERNAL_API_TOKEN:change-me-internal-token-change-me-internal-token}
  transfer-limits:
    per-transaction-max: ${PER_TX_LIMIT:100000}
    per-day-max: ${PER_DAY_LIMIT:500000}

payment-service:
  reconciliation:
    scan-interval: ${RECONCILIATION_SCAN_INTERVAL:PT1M}
    stale-pending-threshold: ${RECONCILIATION_STALE_THRESHOLD:PT5M}
    batch-size: ${RECONCILIATION_BATCH_SIZE:100}
  code-poll:
    interval: ${CODE_POLL_INTERVAL:PT20S}
  recon:
    cron: ${RECON_CRON:0 30 2 * * *}
  kafka:
    transaction-completed:
      partitions: ${PAYMENT_TX_TOPIC_PARTITIONS:3}
      replicas: ${PAYMENT_TX_TOPIC_REPLICAS:1}

app:
  idempotency:
    store: ${IDEMPOTENCY_STORE:memory}

audit:
  # OWASP A09 — HMAC key that seals every audit_events row (tamper-evidence).
  # Lives in env, never in the DB; ProductionSecretsGuard refuses to boot under
  # a deployment profile while it still holds this placeholder.
  hmac-secret: ${AUDIT_HMAC_SECRET:change-me-audit-hmac-secret}
  integrity:
    verify-limit: ${AUDIT_INTEGRITY_VERIFY_LIMIT:5000}
    verify-cron: ${AUDIT_INTEGRITY_VERIFY_CRON:0 30 3 * * *}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  # OWASP A02 stage-1 RS256/JWKS dual-verify. When JWT_PUBLIC_KEY is set this
  # service verifies BOTH HS256 and RS256 tokens (alg selected per-token); unset
  # = HS256 only, as before. Set fleet-wide BEFORE user-service flips to RS256
  # minting. PKCS#8/X.509 PEM (-----BEGIN PUBLIC KEY-----).
  public-key: ${JWT_PUBLIC_KEY:}

resilience4j:
  retry:
    instances:
      oradian-middleware:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - innbucks.paymentservice.client.OradianMiddlewareTransientException
      innbucks-api:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - innbucks.paymentservice.client.InnbucksApiTransientException
  circuitbreaker:
    instances:
      oradian-middleware:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - innbucks.paymentservice.client.OradianMiddlewareTransientException
      innbucks-api:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - innbucks.paymentservice.client.InnbucksApiTransientException

innbucks-api:
  base-url: ${BANK_API_URL:https://staging.innbucks.co.zw}
  api-key: ${BANK_API_KEY:}
  username: ${BANK_API_USERNAME:}
  password: ${BANK_API_PASSWORD:}
  connect-timeout-ms: ${BANK_API_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${BANK_API_READ_TIMEOUT_MS:20000}
  token-ttl: ${BANK_API_TOKEN_TTL:PT8M}

payments:
  innbucks:
    enabled: ${PAYMENTS_INNBUCKS_ENABLED:true}
    code:
      ttl: ${PAYMENTS_CODE_TTL:PT10M}
    recon:
      account: ${PAYMENTS_INNBUCKS_MERCHANT_ACCOUNT:}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8085
  shutdown: graceful
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{country:-},%X{homeCountry:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"

---
# OWASP A05: in a deployed cell each backend serves its OpenAPI SPEC ONLY
# (/v3/api-docs) so the gateway can aggregate it — the interactive Swagger UI
# stays OFF here. The gateway hosts the single UI behind an HTTP Basic login
# (SWAGGER_PASSWORD), which also gates the proxied /*-service/v3/api-docs paths
# and fails closed when unset. Backends are never published at the edge (gateway
# only), so the spec is reachable only in-cluster or via that gated proxy.
# dev/test keep the full UI on for local use.
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: false
