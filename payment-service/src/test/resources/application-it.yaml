# Integration-test profile — runs against the Testcontainers Postgres
# spun up by PostgresIntegrationTestBase. Mirrors production: Flyway owns
# the schema (src/main/resources/db/migration/V*.sql), Hibernate validates
# entities against the actual columns. Catches drift that a no-database
# unit test never would.
#
# datasource.url/username/password are injected by @DynamicPropertySource
# in PostgresIntegrationTestBase — the values here are placeholders so
# Boot's binding succeeds before Testcontainers starts the container.
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  # The Eureka client is on the classpath now, but tests must not register
  # with a registry; disabling discovery makes the Eureka auto-config back off.
  cloud:
    discovery:
      enabled: false

# JWT verifier secret — payment-service only validates tokens, never mints
# them. The value matches user-service's it-profile placeholder so an end-
# to-end IT spanning both services can pass tokens directly.
jwt:
  secret: it-jwt-secret-it-jwt-secret-it-jwt-secret-it-jwt-secret

innbucks:
  internal-api-token: it-internal-token-it-internal-token

# Downstream clients are exercised in unit tests via Mockito; the IT context
# only needs Boot to bind the properties without trying a real HTTP call.
oradian-middleware:
  base-url: http://oradian-middleware.invalid
  internal-token: it-oradian-token
  connect-timeout-ms: 100
  read-timeout-ms: 100

booking-service:
  base-url: http://booking-service.invalid
  connect-timeout-ms: 100
  read-timeout-ms: 100

loyalty-service:
  base-url: http://loyalty-service.invalid
  connect-timeout-ms: 100
  read-timeout-ms: 100

logging:
  level:
    # Flyway logs migrations applied at INFO; Hibernate's schema validator
    # logs each table+column lookup at DEBUG. Bumped above the WARN root so
    # CI surfaces *which* migrations ran and *which* tables the validator
    # missed — the difference between "Flyway never ran" and "Flyway ran
    # but the entity expects a column the migration didn't create".
    org.flywaydb: INFO
    org.hibernate.tool.schema: DEBUG
    root: WARN
    innbucks.paymentservice: INFO
