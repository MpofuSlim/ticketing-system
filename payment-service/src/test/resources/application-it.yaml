spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  cloud:
    discovery:
      enabled: false

jwt:
  secret: it-jwt-secret-it-jwt-secret-it-jwt-secret-it-jwt-secret

innbucks:
  internal-api-token: it-internal-token-it-internal-token

oradian-middleware:
  base-url: http://oradian-middleware.invalid
  internal-token: it-oradian-token
  connect-timeout-ms: 100
  read-timeout-ms: 100

booking-service:
  base-url: http://booking-service.invalid
  connect-timeout-ms: 100
  read-timeout-ms: 100

loyalty-service:
  base-url: http://loyalty-service.invalid
  connect-timeout-ms: 100
  read-timeout-ms: 100

logging:
  level:
    org.flywaydb: INFO
    org.hibernate.tool.schema: DEBUG
    root: WARN
    innbucks.paymentservice: INFO
