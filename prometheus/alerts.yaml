groups:

  - name: availability
    interval: 30s
    rules:

      - alert: ServiceDown
        expr: up{job=~"api-gateway|user-service|event-service|seat-service|booking-service|payment-service|loyalty-service"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus has been unable to scrape {{ $labels.job }} on {{ $labels.instance }} for 2 minutes."
          runbook: "prometheus/slo.md#servicedown"

      - alert: HighHttp5xxRate
        expr: |
          sum by (job) (rate(http_server_requests_seconds_count{status=~"5..",job!="api-gateway"}[5m]))
            / sum by (job) (rate(http_server_requests_seconds_count{job!="api-gateway"}[5m]))
            > 0.01
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "{{ $labels.job }} 5xx rate > 1%"
          description: "{{ $labels.job }} returning {{ $value | humanizePercentage }} 5xx over the last 5m."
          runbook: "prometheus/slo.md#highhttp5xxrate"

  - name: latency
    interval: 30s
    rules:

      - alert: ShopCheckoutP95Slow
        expr: |
          histogram_quantile(0.95,
            sum by (le, job) (rate(payment_shop_checkout_duration_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Shop checkout p95 latency > 1s"
          description: "payment-service /payments/shop-checkout p95 = {{ $value | humanizeDuration }} over the last 5m."
          runbook: "prometheus/slo.md#shopcheckoutp95slow"

      - alert: ShopCheckoutP99Slow
        expr: |
          histogram_quantile(0.99,
            sum by (le, job) (rate(payment_shop_checkout_duration_seconds_bucket[5m]))
          ) > 3
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Shop checkout p99 latency > 3s"
          description: "payment-service /payments/shop-checkout p99 = {{ $value | humanizeDuration }}."
          runbook: "prometheus/slo.md#shopcheckoutp95slow"

  - name: business
    interval: 30s
    rules:

      - alert: LoyaltyUnavailableFromPayment
        expr: rate(payment_shop_checkout_total{outcome="loyalty_unavailable"}[1m]) > 0
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "Shop checkout failing because loyalty-service is unreachable"
          description: "{{ $value | humanize }} loyalty_unavailable events/sec on payment.shop_checkout."
          runbook: "prometheus/slo.md#loyaltyunavailablefrompayment"

      - alert: ShopCheckoutRejectionSpike
        expr: |
          sum by (reason) (rate(loyalty_shop_checkout_rejected_total[5m]))
            >
          5 * sum by (reason) (rate(loyalty_shop_checkout_rejected_total[1h] offset 5m))
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Shop checkout rejections spiked for reason={{ $labels.reason }}"
          description: "Rejection rate is {{ $value | humanize }}/s vs 1h baseline."
          runbook: "prometheus/slo.md#shopcheckoutrejectionspike"

      - alert: FraudRejectionsHigh
        expr: sum(rate(loyalty_fraud_rejected_total[5m])) > 0.5
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Loyalty fraud rejection rate > 0.5/s"
          description: "loyalty_fraud_rejected ringing at {{ $value | humanize }}/s sustained."
          runbook: "prometheus/slo.md#fraudrejectionshigh"

      - alert: PointsEarnedFlatlined
        expr: |
          rate(loyalty_transaction_posted_total{type="PURCHASE"}[15m]) > 0.1
            and
          rate(loyalty_points_earned_points_total[15m]) == 0
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "PURCHASE transactions posting but zero points earned"
          description: "Rules engine returned 0 for every PURCHASE in the last 15m. Check active rules."
          runbook: "prometheus/slo.md#pointsearnedflatlined"

  - name: infrastructure
    interval: 30s
    rules:

      - alert: HikariPoolExhausted
        expr: hikaricp_connections_active >= hikaricp_connections_max
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "{{ $labels.job }} DB pool exhausted ({{ $labels.pool }})"
          description: "All {{ $labels.pool }} Hikari connections in use for >1m on {{ $labels.instance }}."
          runbook: "prometheus/slo.md#hikaripoolexhausted"

      - alert: JvmHeapPressure
        expr: |
          sum by (job, instance) (jvm_memory_used_bytes{area="heap"})
            / sum by (job, instance) (jvm_memory_max_bytes{area="heap"})
            > 0.85
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "{{ $labels.job }} heap > 85%"
          description: "Heap usage on {{ $labels.instance }} = {{ $value | humanizePercentage }} for 10m."
          runbook: "prometheus/slo.md#jvmheappressure"

      - alert: OtelExportFailing
        expr: increase(otlp_exporter_exported_spans_failed_total[10m]) > 0
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "OTLP span export failing on {{ $labels.job }}"
          description: "{{ $value | humanize }} failed span exports in the last 10m. OTLP_ENDPOINT reachable?"
          runbook: "prometheus/slo.md#otelexportfailing"

  # OWASP A09 — security-abuse detection. Fed by user-service SecurityMetrics
  # (security.* counters, exported as security_*_total). Baselines for these are
  # ~0 in normal operation, so the thresholds are deliberately low: they're
  # "someone is attacking" signals, not capacity signals.
  - name: security
    interval: 30s
    rules:

      - alert: FailedLoginSpike
        expr: sum(rate(security_auth_login_failure_total[5m])) > 1
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Failed-login rate elevated (possible credential stuffing)"
          description: "{{ $value | humanize }} failed logins/sec cluster-wide over 5m (sustained 10m)."
          runbook: "prometheus/slo.md#failedloginspike"

      - alert: AccountLockoutSpike
        expr: sum(rate(security_auth_account_locked_total[5m])) > 0.2
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Accounts locking out steadily (possible brute force)"
          description: "{{ $value | humanize }} lockouts/sec over 5m — attacker walking accounts, or a broken client."
          runbook: "prometheus/slo.md#accountlockoutspike"

      - alert: RefreshTokenReuse
        expr: sum(increase(security_auth_token_reuse_total[10m])) > 2
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "Refresh-token replay detected"
          description: "{{ $value | humanize }} refresh-token reuse events in 10m — a stolen/leaked token is being replayed (families were revoked)."
          runbook: "prometheus/slo.md#refreshtokenreuse"

      - alert: InternalTokenProbing
        expr: sum(rate(security_auth_internal_token_failure_total[5m])) > 0
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Internal S2S token failures (misconfig or probing of the trust boundary)"
          description: "{{ $value | humanize }}/sec X-Internal-Token rejections over 5m. Expected 0 — a service is misconfigured, or someone is probing /users/internal/**."
          runbook: "prometheus/slo.md#internaltokenprobing"

      - alert: AuthRateLimitSpike
        expr: sum(rate(security_auth_rate_limited_total[5m])) > 1
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Auth rate-limiter firing heavily (abuse/automation)"
          description: "{{ $value | humanize }} rate-limited auth requests/sec over 5m on {{ $labels.endpoint }}."
          runbook: "prometheus/slo.md#authratelimitspike"

      - alert: MfaChallengeFailureSpike
        expr: sum(rate(security_auth_mfa_failure_total[5m])) > 0.5
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "MFA challenge failures elevated (possible MFA brute force)"
          description: "{{ $value | humanize }} failed MFA challenges/sec over 5m."
          runbook: "prometheus/slo.md#mfachallengefailurespike"

      - alert: AuthzDeniedSpike
        expr: sum(rate(security_authz_denied_total[5m])) > 1
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "403 access-denied rate elevated (possible privilege probing)"
          description: "{{ $value | humanize }} forbidden ({{ $labels.method }}) responses/sec over 5m — an authenticated principal is hitting resources it can't access."
          runbook: "prometheus/slo.md#authzdeniedspike"

      - alert: AuditIntegrityBroken
        expr: increase(security_audit_integrity_broken_total[1h]) > 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "audit_events tamper detected — HMAC verification failed"
          description: "{{ $value | humanize }} audit rows failed HMAC verification in the last hour. Someone altered the audit log, or the audit.hmac-secret rotated without a re-seal. Treat as an incident."
          runbook: "prometheus/slo.md#auditintegritybroken"

      # A09: sustained invalid-token (401) volume at the services (the gateway
      # doesn't verify JWTs — downstream services do, so 401s originate there).
      # A steady rate is a broken client or a token-brute-force sweep; the
      # gateway is excluded like HighHttp5xxRate. Distinct from AuthzDenied (403).
      - alert: Auth401Spike
        expr: sum(rate(http_server_requests_seconds_count{status="401",job!="api-gateway"}[5m])) > 1
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Invalid-token (401) rate elevated (token brute force or broken client)"
          description: "{{ $value | humanize }} 401 responses/sec cluster-wide over 5m (sustained 10m). Baseline is near-zero once clients refresh correctly."
          runbook: "prometheus/slo.md#auth401spike"

  # A09 — payment money-movement integrity. Fed by payment-service PaymentMetrics
  # (payment.* counters, exported as payment_*_total). These were emitted but had
  # NO alert rule, so a customer-debited-without-tickets drip or a settlement
  # discrepancy fired silently. Per PaymentMetrics' own contract, any non-zero on
  # the money-safety signals is page-worthy. Metrics exist only on payment-service
  # (scraped Bearer-authenticated), so no job filter is needed.
  - name: payment-integrity
    interval: 30s
    rules:

      - alert: PaymentUnconfirmedRetryStillFailing
        expr: sum(increase(payment_payments_unconfirmed_retry_total{outcome="still_failing"}[15m])) > 0
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Paid-but-unconfirmed bookings the reconciler can't resolve"
          description: "{{ $value | humanize }} still-failing confirm retries in 15m (sustained 10m) — customer money moved but the booking never confirmed. Work the operator queue."
          runbook: "prometheus/slo.md#paymentunconfirmedretrystillfailing"

      - alert: PaymentReconDiscrepancy
        expr: sum(increase(payment_recon_discrepancies_total[1h])) > 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "Settlement reconciliation discrepancy"
          description: "{{ $value | humanize }} settlement discrepancies ({{ $labels.type }}) in the last hour. Our ledger and the InnBucks statement disagree — treat as a money incident."
          runbook: "prometheus/slo.md#paymentrecondiscrepancy"

      - alert: PaymentStaleInDoubt
        expr: sum(increase(payment_payments_stale_total{status="IN_DOUBT"}[15m])) > 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Ticket payments stuck IN_DOUBT (money may have moved)"
          description: "{{ $value | humanize }} payment rows past the reconciliation threshold in IN_DOUBT over 15m — the upstream outcome is unclassifiable and money MAY have left the customer."
          runbook: "prometheus/slo.md#paymentstaleindoubt"

      - alert: PaymentCodeResolutionUnknown
        expr: sum(increase(payment_payments_code_resolution_total{outcome=~"unknown|error"}[15m])) > 0
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Code-status poller returning unknown/error outcomes"
          description: "{{ $value | humanize }} unknown/error code-resolution outcomes in 15m (sustained 10m) — the InnBucks status contract needs attention while customer money may be waiting."
          runbook: "prometheus/slo.md#paymentcoderesolutionunknown"

      - alert: PaymentStalePendingDrip
        expr: sum(increase(payment_transactions_stale_pending_total[15m])) > 0
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "PENDING payment rows not settling to a terminal state"
          description: "{{ $value | humanize }} stale-PENDING rows in 15m (sustained 10m) — payment-service is failing to mark rows SUCCEEDED/FAILED (likely a DB hiccup after the upstream call)."
          runbook: "prometheus/slo.md#paymentstalependingdrip"

      - alert: PaymentAuditIntegrityBroken
        expr: increase(payment_audit_integrity_broken_total[1h]) > 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "payment audit_events tamper detected — HMAC verification failed"
          description: "{{ $value | humanize }} payment audit rows failed HMAC verification in the last hour. Someone altered the payment audit log, or the audit.hmac-secret rotated without a re-seal. Treat as a money-movement incident."
          runbook: "prometheus/slo.md#paymentauditintegritybroken"
