global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: ticketing
    environment: ""

rule_files:
  - /etc/prometheus/rules/alerts.yaml

# Route firing alerts to Alertmanager. Without this block the rules in
# alerts.yaml evaluate but page nobody (OWASP A09 — an alert that reaches no
# receiver is not monitoring). Alertmanager fans out to the real channels
# (see alertmanager.yml). Host/port assume Alertmanager runs alongside
# Prometheus in the monitoring stack (compose service / k8s Service named "alertmanager").
alerting:
  alertmanagers:
    - static_configs:
        - targets: [ "alertmanager:9093" ]

scrape_configs:

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "api-gateway:8080" ]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "user-service:8081" ]

  - job_name: event-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "event-service:8082" ]

  - job_name: seat-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "seat-service:8083" ]

  - job_name: booking-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "booking-service:8084" ]

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/payment-service-token
    static_configs:
      - targets: [ "payment-service:8085" ]

  - job_name: loyalty-service
    metrics_path: /actuator/prometheus
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/loyalty-service-token
    static_configs:
      - targets: [ "loyalty-service:8086" ]
