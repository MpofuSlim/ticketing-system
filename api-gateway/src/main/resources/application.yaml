spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Redis-backed token bucket store for the gateway's RequestRateLimiter.
  # Defaults assume the local docker-compose Redis on the same network.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-auth-route
              uri: ${USER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/auth/**

            - id: event-service-route
              uri: ${EVENT_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/events/**

            - id: seat-service-seat-route
              uri: ${SEAT_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/seats/**
            - id: seat-service-category-route
              uri: ${SEAT_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/seat-categories/**

            - id: booking-service-route
              uri: ${BOOKING_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/bookings/**

            - id: payment-service-route
              uri: ${PAYMENT_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/payments/**

            - id: loyalty-service-route
              uri: ${LOYALTY_SERVICE_URI:http://localhost:8086}
              predicates:
                - Path=/api/loyalty/**

            - id: user-service-proxy-route
              uri: ${USER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/user-service/**
              filters:
                - StripPrefix=1

            - id: event-service-proxy-route
              uri: ${EVENT_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/event-service/**
              filters:
                - StripPrefix=1

            - id: seat-service-proxy-route
              uri: ${SEAT_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/seat-service/**
              filters:
                - StripPrefix=1

            - id: booking-service-proxy-route
              uri: ${BOOKING_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/booking-service/**
              filters:
                - StripPrefix=1

            - id: payment-service-proxy-route
              uri: ${PAYMENT_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/payment-service/**
              filters:
                - StripPrefix=1

            - id: loyalty-service-proxy-route
              uri: ${LOYALTY_SERVICE_URI:http://localhost:8086}
              predicates:
                - Path=/loyalty-service/**
              filters:
                - StripPrefix=1

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Allow-Headers Access-Control-Allow-Methods, RETAIN_FIRST
            # Gateway-wide rate limit. Token bucket per resolved key (bearer
            # token if present, else client IP — see RateLimiterConfig).
            # Defaults to 50 req/s sustained with a 100-burst, overridable
            # via env. Returns 429 with Retry-After when over budget.
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@gatewayKeyResolver}"

          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                # Comma-separated list of allowed origins. Defaults to localhost
                # for dev. In production set CORS_ALLOWED_ORIGINS to your real
                # client origins (e.g. https://app.example.com,https://admin.example.com).
                # Wildcard '*' is intentionally NOT supported here because
                # allowCredentials=true requires explicit origins.
                allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: event-service
        url: /event-service/v3/api-docs
      - name: seat-service
        url: /seat-service/v3/api-docs
      - name: booking-service
        url: /booking-service/v3/api-docs
      - name: payment-service
        url: /payment-service/v3/api-docs
      - name: loyalty-service
        url: /loyalty-service/v3/api-docs
