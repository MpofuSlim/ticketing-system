spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-customer-lookup-route
              uri: lb://user-service
              predicates:
                - Path=/auth/customer/send-money/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${AUTH_LOOKUP_RATE_LIMIT_REPLENISH_PER_SECOND:5}
                    redis-rate-limiter.burstCapacity: ${AUTH_LOOKUP_RATE_LIMIT_BURST_CAPACITY:10}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: auth-customer-route
              uri: lb://user-service
              predicates:
                - Path=/auth/customer/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${AUTH_CUSTOMER_RATE_LIMIT_REPLENISH_PER_SECOND:20}
                    redis-rate-limiter.burstCapacity: ${AUTH_CUSTOMER_RATE_LIMIT_BURST_CAPACITY:40}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: auth-register-route
              uri: lb://user-service
              predicates:
                - Path=/auth/register
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${AUTH_REGISTER_RATE_LIMIT_REPLENISH_PER_SECOND:1}
                    redis-rate-limiter.burstCapacity: ${AUTH_REGISTER_RATE_LIMIT_BURST_CAPACITY:5}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"
                    # Fail-SAFE: keep throttling this SMS/abuse surface if Redis is down.
                    rate-limiter: "#{@resilientRedisRateLimiter}"

            # OTP request/verify trigger real SMS sends, so they are the one
            # money-cost surface on the otherwise-limiter-free /auth/** family.
            # OtpService already caps a SINGLE msisdn at 3 / 10 min, but an
            # attacker rotating msisdns from one IP bypasses that per-msisdn cap
            # and burns the SMS budget — this per-IP gateway bucket closes the
            # amplification hole. Pre-auth (no bearer), so gatewayKeyResolver
            # keys by client IP here. MUST precede the /auth/** catch-all below.
            # (Login deliberately stays on the limiter-free catch-all so a Redis
            # outage can't lock everyone out; brute force is covered by the
            # per-account login lockout, not by this limiter.)
            - id: auth-otp-route
              uri: lb://user-service
              predicates:
                - Path=/auth/otp/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${AUTH_OTP_RATE_LIMIT_REPLENISH_PER_SECOND:1}
                    redis-rate-limiter.burstCapacity: ${AUTH_OTP_RATE_LIMIT_BURST_CAPACITY:3}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"
                    # Fail-SAFE: OTP sends real SMS — keep throttling if Redis is down.
                    rate-limiter: "#{@resilientRedisRateLimiter}"

            # 2FA endpoints: rate-limit per-IP to bound TOTP/backup-code brute
            # force. Deliberately stays on the default fail-OPEN Redis limiter
            # (NOT the fail-safe one): a Redis outage must never throttle/lock
            # legitimate users out mid-login — e.g. many users behind one shared
            # corporate IP would otherwise be squeezed to the per-instance bucket
            # rate. Brute force is instead capped per-ACCOUNT downstream:
            # AuthService.completeLoginWithMfa counts wrong codes in the
            # users.mfa_failed_attempts / mfa_locked_until columns (dedicated,
            # NOT reset by the password step, so a password-holding attacker
            # can't clear their strikes by re-authenticating) and returns 423 at
            # the threshold. That account-level cap holds even during a Redis
            # outage, which is exactly what lets this edge limiter afford to fail
            # open without leaving MFA unbounded. Matched BEFORE the /auth/**
            # catch-all below.
            - id: auth-mfa-route
              uri: lb://user-service
              predicates:
                - Path=/auth/login/mfa,/auth/mfa/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${AUTH_OTP_RATE_LIMIT_REPLENISH_PER_SECOND:1}
                    redis-rate-limiter.burstCapacity: ${AUTH_OTP_RATE_LIMIT_BURST_CAPACITY:3}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            # Forgot-password: the request step sends an OTP (SMS cost + abuse
            # vector), so rate-limit it like /auth/otp/**. Matched BEFORE the
            # /auth/** catch-all below. reset-password is included so a brute
            # force of the code is throttled per-IP on top of the per-phone OTP
            # failed-attempt cap.
            - id: auth-password-reset-route
              uri: lb://user-service
              predicates:
                - Path=/auth/forgot-password,/auth/reset-password
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${AUTH_OTP_RATE_LIMIT_REPLENISH_PER_SECOND:1}
                    redis-rate-limiter.burstCapacity: ${AUTH_OTP_RATE_LIMIT_BURST_CAPACITY:3}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"
                    # Fail-SAFE: forgot-password sends SMS OTP — keep throttling if Redis is down.
                    rate-limiter: "#{@resilientRedisRateLimiter}"

            - id: user-auth-route
              uri: lb://user-service
              predicates:
                - Path=/auth/**

            - id: cells-lookup-route
              uri: lb://user-service
              predicates:
                - Path=/cells/**

            - id: user-admin-route
              uri: lb://user-service
              predicates:
                - Path=/admin/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: booking-event-organizer-reports-route
              uri: lb://booking-service
              predicates:
                - Path=/event-organizer/reports/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: user-event-organizer-route
              uri: lb://user-service
              predicates:
                - Path=/event-organizer/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: user-internal-deny
              uri: forward:/__edge_deny__
              predicates:
                - Path=/users/internal/**

            - id: user-self-route
              uri: lb://user-service
              predicates:
                - Path=/users/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: event-availability-deny
              uri: forward:/__edge_deny__
              predicates:
                - Path=/events/*/availability/**

            - id: event-service-route
              uri: lb://event-service
              predicates:
                - Path=/events/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: seat-service-seat-route
              uri: lb://seat-service
              predicates:
                - Path=/seats/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"
            - id: seat-service-category-route
              uri: lb://seat-service
              predicates:
                - Path=/seat-categories/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: booking-internal-deny
              uri: forward:/__edge_deny__
              predicates:
                - Path=/bookings/internal/**

            - id: booking-service-route
              uri: lb://booking-service
              predicates:
                - Path=/bookings/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: booking-invoices-route
              uri: lb://booking-service
              predicates:
                - Path=/invoices/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: booking-tickets-route
              uri: lb://booking-service
              predicates:
                - Path=/tickets/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: scans-route
              uri: lb://booking-service
              predicates:
                - Path=/scans/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: brand-assets-route
              uri: lb://booking-service
              predicates:
                - Path=/brand/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: payment-internal-deny
              uri: forward:/__edge_deny__
              predicates:
                - Path=/payments/internal/**

            - id: payment-service-read-route
              uri: lb://payment-service
              predicates:
                - Path=/payments/**
                - Method=GET
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${PAYMENTS_READ_RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${PAYMENTS_READ_RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"
                    # Fail-SAFE: keep throttling the payments surface if Redis is down.
                    rate-limiter: "#{@resilientRedisRateLimiter}"

            - id: payments-innbucks-write-route
              uri: lb://payment-service
              predicates:
                - Path=/payments/innbucks
                - Method=POST
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${PAYMENTS_INNBUCKS_RATE_LIMIT_REPLENISH_PER_SECOND:1}
                    redis-rate-limiter.burstCapacity: ${PAYMENTS_INNBUCKS_RATE_LIMIT_BURST_CAPACITY:3}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@paymentsInnbucksIpKeyResolver}"
                    # Fail-SAFE: public payment-initiation rail — keep throttling if Redis is down.
                    rate-limiter: "#{@resilientRedisRateLimiter}"

            - id: payment-service-write-route
              uri: lb://payment-service
              predicates:
                - Path=/payments/**
                - Method=POST,PUT,PATCH,DELETE
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${PAYMENTS_WRITE_RATE_LIMIT_REPLENISH_PER_SECOND:1}
                    redis-rate-limiter.burstCapacity: ${PAYMENTS_WRITE_RATE_LIMIT_BURST_CAPACITY:5}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"
                    # Fail-SAFE: payment mutation (money path) — keep throttling if Redis is down.
                    rate-limiter: "#{@resilientRedisRateLimiter}"

            - id: loyalty-internal-deny
              uri: forward:/__edge_deny__
              predicates:
                - Path=/loyalty/internal/**

            - id: loyalty-service-route
              uri: lb://loyalty-service
              predicates:
                - Path=/loyalty/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: user-service-proxy-route
              uri: lb://user-service
              predicates:
                - Path=/user-service/v3/api-docs,/user-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: event-service-proxy-route
              uri: lb://event-service
              predicates:
                - Path=/event-service/v3/api-docs,/event-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: seat-service-proxy-route
              uri: lb://seat-service
              predicates:
                - Path=/seat-service/v3/api-docs,/seat-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: booking-service-proxy-route
              uri: lb://booking-service
              predicates:
                - Path=/booking-service/v3/api-docs,/booking-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: payment-service-proxy-route
              uri: lb://payment-service
              predicates:
                - Path=/payment-service/v3/api-docs,/payment-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: loyalty-service-proxy-route
              uri: lb://loyalty-service
              predicates:
                - Path=/loyalty-service/v3/api-docs,/loyalty-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:https://innvents.vercel.app,https://innbucks-ticketing.vercel.app,http://localhost:[*]}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

gateway:
  trusted-proxy-count: ${GATEWAY_TRUSTED_PROXY_COUNT:1}

# Fail-safe rate-limit fallback (OWASP A04). When Redis is unreachable the
# SMS-cost / payment routes wired to @resilientRedisRateLimiter keep throttling
# via an in-memory Bucket4j bucket (see ResilientRedisRateLimiter). These knobs
# only bound that per-instance fallback map; steady-state limits still come from
# the per-route redis-rate-limiter.* args. max-buckets caps distinct
# (route,key) buckets (LRU eviction); bucket-idle-minutes expires idle keys.
innbucks:
  ratelimit:
    fallback:
      max-buckets: ${RATE_LIMIT_FALLBACK_MAX_BUCKETS:50000}
      bucket-idle-minutes: ${RATE_LIMIT_FALLBACK_BUCKET_IDLE_MINUTES:10}

security:
  headers:
    frame-options: ${SECURITY_HEADERS_FRAME_OPTIONS:DENY}
    hsts: ${SECURITY_HEADERS_HSTS:max-age=31536000; includeSubDomains}
    referrer-policy: ${SECURITY_HEADERS_REFERRER_POLICY:strict-origin-when-cross-origin}
    permissions-policy: ${SECURITY_HEADERS_PERMISSIONS_POLICY:geolocation=(), camera=(), microphone=(), payment=()}
    csp: ${SECURITY_HEADERS_CSP:}
    csp-enforce: ${SECURITY_HEADERS_CSP_ENFORCE:false}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  # The public edge (Cloudflare/nginx on dtx.innbucks.co.zw) now mounts this
  # system under a path prefix (/foundry) shared with other systems on the
  # domain, stripping the prefix before proxying and declaring it via
  # X-Forwarded-Prefix (plus the standard X-Forwarded-Proto/Host). `framework`
  # makes WebFlux honor those headers when constructing URIs, so anything that
  # builds an absolute or root-relative URL (springdoc/Swagger links, redirect
  # Locations) reflects the public https://.../foundry/... form instead of the
  # stripped internal one. No effect on route matching, and a no-op when the
  # headers are absent (local dev, direct calls).
  forward-headers-strategy: framework

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  server:
    port: ${MANAGEMENT_PORT:9090}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"

# PUBLIC_API_PREFIX: the path prefix the public edge mounts this system under
# (dtx.innbucks.co.zw hosts several systems; ours lives at /foundry). nginx
# STRIPS the prefix before proxying, so routes/services never see it — but the
# browser-side Swagger UI fetches these URLs from the PUBLIC origin, so they
# must carry the prefix to survive the round-trip through the edge. Deliberately
# plain config, NOT X-Forwarded-Prefix: the gateway applies that header to
# route matching (every route 404s), which is why the edge must not send it.
# Empty default = domain-root behavior (local dev, direct NodePort access).
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    config-url: ${PUBLIC_API_PREFIX:}/v3/api-docs/swagger-config
    urls:
      - name: user-service
        url: ${PUBLIC_API_PREFIX:}/user-service/v3/api-docs
      - name: event-service
        url: ${PUBLIC_API_PREFIX:}/event-service/v3/api-docs
      - name: seat-service
        url: ${PUBLIC_API_PREFIX:}/seat-service/v3/api-docs
      - name: booking-service
        url: ${PUBLIC_API_PREFIX:}/booking-service/v3/api-docs
      - name: payment-service
        url: ${PUBLIC_API_PREFIX:}/payment-service/v3/api-docs
      - name: loyalty-service
        url: ${PUBLIC_API_PREFIX:}/loyalty-service/v3/api-docs

# HTTP Basic credentials guarding the Swagger UI above (see
# SwaggerSecurityConfig). With a blank password Swagger fails closed under the
# prod profile (disabled — returns 404) and stays open in non-prod (a warning is
# logged); set SWAGGER_PASSWORD to require a login in any profile.
swagger:
  auth:
    username: ${SWAGGER_USER:admin}
    password: ${SWAGGER_PASSWORD:}
