spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Redis-backed token bucket store for the gateway's RequestRateLimiter.
  # Defaults assume the local docker-compose Redis on the same network.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      server:
        webflux:
          # The /auth/** catch-all (user-auth-route, declared last in this group)
          # intentionally skips the rate limiter so logins still work when Redis
          # is unreachable (the Redis-backed RequestRateLimiter fails closed with
          # 403 on connection errors). Brute-force protection for login/refresh/
          # OTP lives in user-service (LoginRateLimiter + account lockout + OTP
          # throttling). A few abuse-prone /auth endpoints are the exception:
          # they get their own rate-limited routes declared BEFORE the catch-all
          # (SCG matches the first listed route that fits). These fail closed on
          # a Redis outage, an acceptable trade for registration/lookup paths
          # while login stays on the limiter-free catch-all.
          routes:
            # Customer account lookup by phone. Authenticated, but one valid
            # token could otherwise walk the phone space to harvest who is a
            # registered customer and their send-money details — tightest bucket.
            - id: auth-customer-lookup-route
              uri: lb://user-service
              predicates:
                - Path=/auth/customer/send-money/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${AUTH_LOOKUP_RATE_LIMIT_REPLENISH_PER_SECOND:5}
                    redis-rate-limiter.burstCapacity: ${AUTH_LOOKUP_RATE_LIMIT_BURST_CAPACITY:10}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            # Remaining customer endpoints: tiered registration + deposit/tier
            # reads (some proxy to the external Oradian middleware). Moderate
            # bucket — ample for normal app use, capped against scripted abuse.
            - id: auth-customer-route
              uri: lb://user-service
              predicates:
                - Path=/auth/customer/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${AUTH_CUSTOMER_RATE_LIMIT_REPLENISH_PER_SECOND:20}
                    redis-rate-limiter.burstCapacity: ${AUTH_CUSTOMER_RATE_LIMIT_BURST_CAPACITY:40}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            # System-user (organizer/merchant) registration. Unauthenticated and
            # rare per real client; a tight per-IP bucket curbs signup spam and
            # email/phone enumeration via the "already registered" response.
            - id: auth-register-route
              uri: lb://user-service
              predicates:
                - Path=/auth/register
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${AUTH_REGISTER_RATE_LIMIT_REPLENISH_PER_SECOND:1}
                    redis-rate-limiter.burstCapacity: ${AUTH_REGISTER_RATE_LIMIT_BURST_CAPACITY:5}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: user-auth-route
              uri: lb://user-service
              predicates:
                - Path=/auth/**

            - id: user-admin-route
              uri: lb://user-service
              predicates:
                - Path=/admin/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            # Self-service endpoints under /users/me/** (e.g. service requests).
            # Block /users/internal/** at the edge. These are service-to-service
            # endpoints (event-service -> user-service tenant lookup) gated by
            # the shared X-Internal-Token header. Real S2S traffic goes directly
            # between pods over the cluster network and never touches the
            # gateway. MUST be declared before the catch-all user-self-route so
            # SCG matches it first (mirrors loyalty-internal-deny).
            - id: user-internal-deny
              uri: forward:/__edge_deny__
              predicates:
                - Path=/users/internal/**

            # Authenticated; rate-limited like the rest of user-service.
            - id: user-self-route
              uri: lb://user-service
              predicates:
                - Path=/users/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            # Block /events/{id}/availability/** at the edge. These are
            # service-to-service write endpoints (booking-service ->
            # event-service decrements availableTickets on a confirmed
            # booking). They have no business being reachable from the
            # public internet — an anonymous PATCH /events/.../availability/
            # consume?count=99999 would drain any event's capacity and DoS
            # legitimate customers. Real service-to-service traffic goes
            # directly between pods over the cluster network and never
            # touches the gateway. MUST be declared before the catch-all
            # event-service-route so SCG matches it first.
            - id: event-availability-deny
              uri: forward:/__edge_deny__
              predicates:
                - Path=/events/*/availability/**

            - id: event-service-route
              uri: lb://event-service
              predicates:
                - Path=/events/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: seat-service-seat-route
              uri: lb://seat-service
              predicates:
                - Path=/seats/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"
            - id: seat-service-category-route
              uri: lb://seat-service
              predicates:
                - Path=/seat-categories/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: booking-service-route
              uri: lb://booking-service
              predicates:
                - Path=/bookings/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            # /payments/** is split into READ vs WRITE routes so each gets
            # the right-sized bucket. Lumping them together meant every
            # history pagination tap counted against the same tight limit
            # as the money-moving POSTs — a customer opening the app +
            # scrolling history would hit 429 after a handful of requests.
            #
            # Both routes use the same Path predicate; the Method predicate
            # disambiguates. Order doesn't matter (predicates are mutually
            # exclusive). OPTIONS preflight is handled by globalcors before
            # route matching so it never touches either rate limiter.

            # READ side — history list + detail. App-open + scroll-paginate
            # easily hits 5+ GETs in a burst; the same generous 50 rps /
            # 100 burst used by /events, /bookings, /seats etc. matches
            # the FE's actual read-traffic profile.
            - id: payment-service-read-route
              uri: lb://payment-service
              predicates:
                - Path=/payments/**
                - Method=GET
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${PAYMENTS_READ_RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${PAYMENTS_READ_RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            # WRITE side — transfer + withdraw move real money via Oradian.
            # Bucket sized at ~1 req/sec / 5 burst per bearer token: a real
            # customer transfers a handful of times per day; the generous
            # 50 rps used elsewhere left ample room for a stolen-token
            # attacker to drain accounts before the bucket bit. The
            # velocity service inside payment-service (per-account daily
            # cap) is the second line of defence.
            - id: payment-service-write-route
              uri: lb://payment-service
              predicates:
                - Path=/payments/**
                - Method=POST,PUT,PATCH,DELETE
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${PAYMENTS_WRITE_RATE_LIMIT_REPLENISH_PER_SECOND:1}
                    redis-rate-limiter.burstCapacity: ${PAYMENTS_WRITE_RATE_LIMIT_BURST_CAPACITY:5}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            # Block /loyalty/internal/** at the edge. These are service-to-service
            # endpoints (user-service -> loyalty-service) gated by the
            # X-Internal-Token shared secret. They have no business being
            # reachable from the public internet, even though the secret check
            # would reject the call — defence in depth, and it also keeps the
            # paths off attacker recon scans (they get a plain 404 instead of
            # a 401 that gives away the endpoint exists). Real service-to-
            # service traffic goes directly between pods inside the cluster
            # network and never touches the gateway. MUST be declared before
            # the catch-all loyalty-service-route so SCG matches it first.
            - id: loyalty-internal-deny
              uri: forward:/__edge_deny__
              predicates:
                - Path=/loyalty/internal/**

            - id: loyalty-service-route
              uri: lb://loyalty-service
              predicates:
                - Path=/loyalty/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            # /{service}-service/v3/api-docs proxy routes exist SOLELY for
            # the Swagger UI aggregator on the gateway (it loads each
            # backend's OpenAPI spec through these paths). The predicate is
            # deliberately scoped to /v3/api-docs/** ONLY — historically it
            # was /**, which let an attacker bypass per-path security at the
            # gateway (e.g. /event-service/events/<id>/availability/consume
            # would skip event-availability-deny; /loyalty-service/loyalty/
            # internal/** would skip loyalty-internal-deny). It also let
            # /user-service/auth/login skip the per-route rate limiter on
            # /auth/**. Locked down to api-docs only, none of that is
            # possible. The RequestRateLimiter is retained as defence in
            # depth against api-docs scraping.
            - id: user-service-proxy-route
              uri: lb://user-service
              predicates:
                - Path=/user-service/v3/api-docs,/user-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: event-service-proxy-route
              uri: lb://event-service
              predicates:
                - Path=/event-service/v3/api-docs,/event-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: seat-service-proxy-route
              uri: lb://seat-service
              predicates:
                - Path=/seat-service/v3/api-docs,/seat-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: booking-service-proxy-route
              uri: lb://booking-service
              predicates:
                - Path=/booking-service/v3/api-docs,/booking-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: payment-service-proxy-route
              uri: lb://payment-service
              predicates:
                - Path=/payment-service/v3/api-docs,/payment-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: loyalty-service-proxy-route
              uri: lb://loyalty-service
              predicates:
                - Path=/loyalty-service/v3/api-docs,/loyalty-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

          default-filters:
            # The gateway's globalcors is the SOLE source of CORS headers on
            # responses. Every downstream service (event/seat/booking/payment/
            # loyalty/user) also configures its own CorsConfigurationSource and
            # decorates responses with Access-Control-* + Vary headers — so a
            # proxied response carries CORS headers TWICE. Spring Cloud
            # Gateway's DefaultCorsProcessor then sees the doubled response
            # and rejects with HTTP 403 "Invalid CORS request" — visible in
            # the browser as a generic CORS failure even though the origin is
            # allowed. (DedupeResponseHeader=...,RETAIN_FIRST helps for exact
            # duplicates but not the asymmetric Vary multiplication that
            # actually trips the processor.)
            #
            # Strip every CORS-related header coming back from upstream so
            # globalcors is the only writer. OPTIONS preflights are handled
            # entirely by the gateway (never forwarded), so this affects only
            # proxied responses — which is exactly where the duplication
            # arises. The long-term cleanup is to delete the per-service CORS
            # configs entirely; this filter is the immediate, no-deploy-risk
            # fix that unblocks the FE today.
            - RemoveResponseHeader=Access-Control-Allow-Origin
            - RemoveResponseHeader=Access-Control-Allow-Credentials
            - RemoveResponseHeader=Access-Control-Allow-Headers
            - RemoveResponseHeader=Access-Control-Allow-Methods
            - RemoveResponseHeader=Access-Control-Expose-Headers
            - RemoveResponseHeader=Access-Control-Max-Age
            - RemoveResponseHeader=Vary

          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                # Comma-separated list of allowed origin patterns. Default
                # is permissive ('*') so dev/Swagger/ngrok/any FE origin
                # works out of the box. Spring Cloud Gateway treats this
                # as an allowed-origin PATTERN, which is compatible with
                # allowCredentials=true (unlike a plain allowed-origins
                # wildcard). MUST be overridden in prod via
                # CORS_ALLOWED_ORIGINS to your real client origins
                # (e.g. https://app.example.com,https://admin.example.com).
                allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:https://innvents.vercel.app,https://innbucks-ticketing.vercel.app,http://localhost:[*]}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

# Number of trusted reverse proxies in front of the gateway. The per-IP
# rate-limit key reads the client address from X-Forwarded-For at this depth
# (default 1 = a single ingress/LB). MUST be set to 0 when the gateway is
# directly internet-exposed with no trusted proxy, otherwise a client could
# forge X-Forwarded-For to mint unlimited rate-limit buckets.
gateway:
  trusted-proxy-count: ${GATEWAY_TRUSTED_PROXY_COUNT:1}

# Browser security response headers — stamped by SecurityHeadersWebFilter on every
# gateway response. X-Content-Type-Options and HSTS are unconditional. X-Frame-Options
# can be relaxed to SAMEORIGIN if the FE ever needs to embed its own pages. CSP is
# OPT-IN: leave `csp` blank to skip it, otherwise it ships in Report-Only mode (the
# header `Content-Security-Policy-Report-Only`) so violations are reported without
# breaking the FE. Flip `csp-enforce: true` once the FE team has validated the
# policy and you want it enforcing.
security:
  headers:
    frame-options: ${SECURITY_HEADERS_FRAME_OPTIONS:DENY}
    hsts: ${SECURITY_HEADERS_HSTS:max-age=31536000; includeSubDomains}
    csp: ${SECURITY_HEADERS_CSP:}
    csp-enforce: ${SECURITY_HEADERS_CSP_ENFORCE:false}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

# Service discovery — the gateway joins the Eureka registry (discovery-server)
# so the lb://<service-name> route URIs below resolve to live instances.
# EUREKA_SERVER_URL points at the registry; the default targets a local
# standalone server for laptop dev.
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  # Distributed tracing via OTel. Sampling defaults to 10% — flip to 1.0 for
  # debug sessions, leave low in prod for cost. OTLP_ENDPOINT points at the
  # OTel collector / Tempo / Jaeger; default localhost is fine for laptop
  # docker-compose, override in k8s. Set TRACING_ENABLED=false to disable
  # entirely (no spans recorded, no exporter calls).
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}


logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: event-service
        url: /event-service/v3/api-docs
      - name: seat-service
        url: /seat-service/v3/api-docs
      - name: booking-service
        url: /booking-service/v3/api-docs
      - name: payment-service
        url: /payment-service/v3/api-docs
      - name: loyalty-service
        url: /loyalty-service/v3/api-docs
