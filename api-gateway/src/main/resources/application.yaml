spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Redis-backed token bucket store for the gateway's RequestRateLimiter.
  # Defaults assume the local docker-compose Redis on the same network.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      server:
        webflux:
          # Rate limiter applied to authenticated routes only. /auth is
          # intentionally excluded so logins still work when Redis is
          # unreachable (Redis-backed RequestRateLimiter fails closed
          # with 403 on connection errors). Brute-force protection for
          # /auth lives in user-service (OTP throttling, etc.).
          routes:
            - id: user-auth-route
              uri: ${USER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/auth/**

            - id: event-service-route
              uri: ${EVENT_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/events/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: seat-service-seat-route
              uri: ${SEAT_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/seats/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"
            - id: seat-service-category-route
              uri: ${SEAT_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/seat-categories/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: booking-service-route
              uri: ${BOOKING_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/bookings/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: payment-service-route
              uri: ${PAYMENT_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/payments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_PER_SECOND:50}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@gatewayKeyResolver}"

            - id: user-service-proxy-route
              uri: ${USER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/user-service/**
              filters:
                - StripPrefix=1

            - id: event-service-proxy-route
              uri: ${EVENT_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/event-service/**
              filters:
                - StripPrefix=1

            - id: seat-service-proxy-route
              uri: ${SEAT_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/seat-service/**
              filters:
                - StripPrefix=1

            - id: booking-service-proxy-route
              uri: ${BOOKING_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/booking-service/**
              filters:
                - StripPrefix=1

            - id: payment-service-proxy-route
              uri: ${PAYMENT_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/payment-service/**
              filters:
                - StripPrefix=1

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Allow-Headers Access-Control-Allow-Methods, RETAIN_FIRST

          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                # Comma-separated list of allowed origins. Defaults to any
                # localhost port for dev (FE on :3000/:5173, Swagger UI on
                # :8080, etc.) plus ngrok tunnels so externally exposed
                # endpoints can be exercised from a browser. In production
                # set CORS_ALLOWED_ORIGINS to your real client origins
                # (e.g. https://app.example.com,https://admin.example.com).
                # Wildcard '*' is intentionally NOT supported here because
                # allowCredentials=true requires explicit origins.
                allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:http://localhost:*,https://*.ngrok-free.app,https://*.ngrok.io,https://*.ngrok.app}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: event-service
        url: /event-service/v3/api-docs
      - name: seat-service
        url: /seat-service/v3/api-docs
      - name: booking-service
        url: /booking-service/v3/api-docs
      - name: payment-service
        url: /payment-service/v3/api-docs
