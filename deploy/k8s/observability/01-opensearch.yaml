# Single-node OpenSearch. SECURITY PLUGIN DISABLED — acceptable ONLY because
# the Service is ClusterIP (never NodePort/Ingress): nothing outside the k3s
# node can reach it, and the box's security group + the gateway edge carry the
# perimeter. If this is ever exposed (Ingress, NodePort, second consumer),
# re-enable the security plugin + credentials FIRST.
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: observability
spec:
  clusterIP: None
  selector: { app: opensearch }
  ports:
    - { name: http, port: 9200 }
    - { name: transport, port: 9300 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: observability
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels: { app: opensearch }
  template:
    metadata:
      labels: { app: opensearch }
    spec:
      # Index files land on the local-path PVC owned by uid 1000 (the
      # opensearch user); the init chown mirrors the postgres pattern in
      # 01-infra.yaml so a fresh PVC is writable.
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /usr/share/opensearch/data"]
          volumeMounts:
            - { name: data, mountPath: /usr/share/opensearch/data }
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.19.1
          env:
            - { name: discovery.type, value: single-node }
            - { name: DISABLE_SECURITY_PLUGIN, value: "true" }
            - { name: DISABLE_INSTALL_DEMO_CONFIG, value: "true" }
            # 1g heap is comfortable for a single-tenant cell's logs+traces;
            # the container limit leaves headroom for off-heap/mmap.
            - { name: OPENSEARCH_JAVA_OPTS, value: "-Xms1g -Xmx1g" }
          ports:
            - { containerPort: 9200 }
            - { containerPort: 9300 }
          resources:
            requests: { memory: 1536Mi, cpu: 250m }
            limits: { memory: 2Gi }
          readinessProbe:
            httpGet: { path: /_cluster/health, port: 9200 }
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /usr/share/opensearch/data }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources: { requests: { storage: 15Gi } }
