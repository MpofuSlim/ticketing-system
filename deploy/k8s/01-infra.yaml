# Postgres / Redis / Kafka for the ticketing cell (single-node k3s).
# Stateful data lives on local-path PVCs (on the node).
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: ticketing }
spec:
  clusterIP: None
  selector: { app: postgres }
  ports: [ { name: pg, port: 5432, targetPort: 5432 } ]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: postgres, namespace: ticketing }
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["postgres","-c","max_connections=150","-c","shared_buffers=128MB"]
          ports: [ { containerPort: 5432 } ]
          env:
            - { name: POSTGRES_USER, valueFrom: { configMapKeyRef: { name: cell-zw, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: cell-zw-secrets, key: POSTGRES_PASSWORD } } }
            - { name: POSTGRES_DB, value: postgres }
          resources: { requests: { memory: 512Mi }, limits: { memory: 1Gi } }
          readinessProbe:
            exec: { command: ["sh","-c","pg_isready -U $POSTGRES_USER"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: init, mountPath: /docker-entrypoint-initdb.d }
      volumes:
        - { name: init, configMap: { name: pg-init } }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], storageClassName: local-path, resources: { requests: { storage: 10Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: ticketing }
spec:
  clusterIP: None
  selector: { app: redis }
  ports: [ { name: redis, port: 6379, targetPort: 6379 } ]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: redis, namespace: ticketing }
spec:
  serviceName: redis
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server","--appendonly","yes","--requirepass","$(REDIS_PASSWORD)","--maxmemory","200mb","--maxmemory-policy","allkeys-lru"]
          env:
            - { name: REDIS_PASSWORD, valueFrom: { secretKeyRef: { name: cell-zw-secrets, key: REDIS_PASSWORD } } }
          ports: [ { containerPort: 6379 } ]
          resources: { requests: { memory: 128Mi }, limits: { memory: 256Mi } }
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts: [ { name: data, mountPath: /data } ]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], storageClassName: local-path, resources: { requests: { storage: 2Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: kafka, namespace: ticketing }
spec:
  clusterIP: None
  # KRaft's broker must resolve kafka:9093 (its own controller) DURING startup,
  # but a headless Service withholds a pod's DNS until it is Ready -> deadlock.
  # Publishing not-ready addresses lets the name resolve immediately.
  publishNotReadyAddresses: true
  selector: { app: kafka }
  ports:
    - { name: internal, port: 9092, targetPort: 9092 }
    - { name: controller, port: 9093, targetPort: 9093 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: kafka, namespace: ticketing }
spec:
  serviceName: kafka
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.1
          ports: [ { containerPort: 9092 }, { containerPort: 9093 } ]
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "controller,broker" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
          resources: { requests: { memory: 1Gi }, limits: { memory: 1536Mi } }
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts: [ { name: data, mountPath: /var/lib/kafka/data } ]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], storageClassName: local-path, resources: { requests: { storage: 5Gi } } }
