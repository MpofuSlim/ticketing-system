# Backend services: event, seat, booking, payment, loyalty.
# All carry the OWASP A05 workload-hardening block (see 03-user-service.yaml for
# the rationale): no SA token, non-root UID 10001, seccomp RuntimeDefault,
# no-priv-escalation, read-only root fs + /tmp emptyDir, all caps dropped.
---
apiVersion: v1
kind: Service
metadata: { name: event-service, namespace: ticketing }
spec: { selector: { app: event-service }, ports: [ { port: 8082, targetPort: 8082 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: event-service, namespace: ticketing }
spec:
  replicas: 1
  selector: { matchLabels: { app: event-service } }
  template:
    metadata: { labels: { app: event-service } }
    spec:
      imagePullSecrets: [ { name: ghcr } ]
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: event-service
          image: ghcr.io/mpofuslim/event-service:latest
          ports: [ { containerPort: 8082 } ]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          envFrom: [ { configMapRef: { name: cell-zw } }, { secretRef: { name: cell-zw-secrets } } ]
          env:
            - { name: JAVA_TOOL_OPTIONS, value: "-XX:MaxRAMPercentage=70.0" }
            - { name: EUREKA_USERNAME, valueFrom: { configMapKeyRef: { name: cell-zw, key: EUREKA_USERNAME } } }
            - { name: EUREKA_PASSWORD, valueFrom: { secretKeyRef: { name: cell-zw-secrets, key: EUREKA_PASSWORD } } }
            - { name: EUREKA_SERVER_URL, value: "http://$(EUREKA_USERNAME):$(EUREKA_PASSWORD)@discovery-server:8761/eureka/,http://$(EUREKA_USERNAME):$(EUREKA_PASSWORD)@discovery-server-2:8761/eureka/" }
            - { name: EUREKA_PREFER_IP_ADDRESS, value: "false" }
            - { name: EUREKA_INSTANCE_HOSTNAME, value: "event-service" }
            - { name: DB_URL, value: "jdbc:postgresql://postgres:5432/event_service" }
            - { name: DB_USERNAME, valueFrom: { configMapKeyRef: { name: cell-zw, key: POSTGRES_USER } } }
            - { name: DB_PASSWORD, valueFrom: { secretKeyRef: { name: cell-zw-secrets, key: POSTGRES_PASSWORD } } }
            - { name: DB_DRIVER, value: "org.postgresql.Driver" }
            - { name: HIBERNATE_DIALECT, value: "org.hibernate.dialect.PostgreSQLDialect" }
            - { name: JPA_DDL_AUTO, value: "validate" }
            - { name: FLYWAY_ENABLED, value: "true" }
            - { name: REDIS_HOST, value: "redis" }
            - { name: REDIS_PORT, value: "6379" }
          resources: { requests: { memory: 448Mi }, limits: { memory: 640Mi } }
          readinessProbe: { httpGet: { path: /actuator/health, port: 8082 }, initialDelaySeconds: 45, periodSeconds: 10, failureThreshold: 24 }
          livenessProbe:  { httpGet: { path: /actuator/health, port: 8082 }, initialDelaySeconds: 180, periodSeconds: 15, failureThreshold: 6 }
          volumeMounts: [ { name: tmp, mountPath: /tmp } ]
      volumes: [ { name: tmp, emptyDir: {} } ]
---
