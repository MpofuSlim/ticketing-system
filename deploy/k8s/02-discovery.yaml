# Eureka discovery servers (HA pair).
---
apiVersion: v1
kind: Service
metadata: { name: discovery-server, namespace: ticketing }
spec:
  selector: { app: discovery-server }
  ports: [ { name: http, port: 8761, targetPort: 8761 } ]
---
apiVersion: v1
kind: Service
metadata: { name: discovery-server-2, namespace: ticketing }
spec:
  selector: { app: discovery-server-2 }
  ports: [ { name: http, port: 8761, targetPort: 8761 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: discovery-server, namespace: ticketing }
spec:
  replicas: 1
  selector: { matchLabels: { app: discovery-server } }
  template:
    metadata: { labels: { app: discovery-server } }
    spec:
      imagePullSecrets: [ { name: ghcr } ]
      containers:
        - name: discovery-server
          image: ghcr.io/mpofuslim/discovery-server:latest
          ports: [ { containerPort: 8761 } ]
          envFrom: [ { configMapRef: { name: cell-zw } }, { secretRef: { name: cell-zw-secrets } } ]
          env:
            - { name: JAVA_TOOL_OPTIONS, value: "-XX:MaxRAMPercentage=70.0" }
            - { name: EUREKA_INSTANCE_HOSTNAME, value: "discovery-server" }
            - { name: EUREKA_USERNAME, valueFrom: { configMapKeyRef: { name: cell-zw, key: EUREKA_USERNAME } } }
            - { name: EUREKA_PASSWORD, valueFrom: { secretKeyRef: { name: cell-zw-secrets, key: EUREKA_PASSWORD } } }
            - { name: EUREKA_PEER_URL, value: ",http://$(EUREKA_USERNAME):$(EUREKA_PASSWORD)@discovery-server-2:8761/eureka/" }
          resources: { requests: { memory: 320Mi }, limits: { memory: 512Mi } }
          readinessProbe: { httpGet: { path: /actuator/health, port: 8761 }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 15 }
          livenessProbe:  { httpGet: { path: /actuator/health, port: 8761 }, initialDelaySeconds: 120, periodSeconds: 15, failureThreshold: 6 }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: discovery-server-2, namespace: ticketing }
spec:
  replicas: 1
  selector: { matchLabels: { app: discovery-server-2 } }
  template:
    metadata: { labels: { app: discovery-server-2 } }
    spec:
      imagePullSecrets: [ { name: ghcr } ]
      containers:
        - name: discovery-server-2
          image: ghcr.io/mpofuslim/discovery-server:latest
          ports: [ { containerPort: 8761 } ]
          envFrom: [ { configMapRef: { name: cell-zw } }, { secretRef: { name: cell-zw-secrets } } ]
          env:
            - { name: JAVA_TOOL_OPTIONS, value: "-XX:MaxRAMPercentage=70.0" }
            - { name: EUREKA_INSTANCE_HOSTNAME, value: "discovery-server-2" }
            - { name: EUREKA_USERNAME, valueFrom: { configMapKeyRef: { name: cell-zw, key: EUREKA_USERNAME } } }
            - { name: EUREKA_PASSWORD, valueFrom: { secretKeyRef: { name: cell-zw-secrets, key: EUREKA_PASSWORD } } }
            - { name: EUREKA_PEER_URL, value: ",http://$(EUREKA_USERNAME):$(EUREKA_PASSWORD)@discovery-server:8761/eureka/" }
          resources: { requests: { memory: 320Mi }, limits: { memory: 512Mi } }
          readinessProbe: { httpGet: { path: /actuator/health, port: 8761 }, initialDelaySeconds: 30, periodSeconds: 10, failureThreshold: 15 }
          livenessProbe:  { httpGet: { path: /actuator/health, port: 8761 }, initialDelaySeconds: 120, periodSeconds: 15, failureThreshold: 6 }
