spring:
  application:
    name: discovery-server
  # Registry Basic-auth credential (enforced only under the prod profile — see
  # SecurityConfig). Clients pass these in their eureka defaultZone URL.
  security:
    user:
      name: ${EUREKA_USERNAME:eureka}
      password: ${EUREKA_PASSWORD:}
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8761}
  shutdown: graceful

eureka:
  instance:
    # In docker-compose / k8s this is overridden to the service name
    # (e.g. discovery-server) so the self-zone URL below resolves on the
    # shared network.
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
  client:
    # Peer-aware by default — register with the peer registry and fetch its
    # snapshot so a client of EITHER node sees a complete fleet. When run
    # standalone (EUREKA_PEER_URL unset), defaultZone resolves to self and
    # there's no peer to register with; setting register-with-eureka=true is
    # harmless because the registry just registers itself on its own zone.
    # Override per-node: set EUREKA_PEER_URL to the OTHER node's eureka URL.
    register-with-eureka: ${EUREKA_REGISTER_WITH_SELF:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}
    service-url:
      # When EUREKA_PEER_URL is set, defaultZone includes BOTH this node and
      # the peer (Eureka treats a comma-separated zone as a peer-replication
      # set). Single-node deployments pass EUREKA_PEER_URL="" and the empty
      # tail is harmless to Eureka's parser.
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/${EUREKA_PEER_URL:}
  server:
    # Self-preservation: when ON, a sudden mass-eviction is suppressed because
    # Eureka assumes the cause is a network partition (not real instance
    # death). Defaulted ON now that the registry runs peer-replicated — a
    # blip between the two nodes must NOT evict the whole fleet from one
    # node's view. Override to false only for short-lived dev runs where you
    # want stale registrations evicted promptly.
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
