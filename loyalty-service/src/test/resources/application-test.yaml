spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///loyalty_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

  cloud:
    discovery:
      enabled: false

loyalty:
  voucher:
    secret: test-voucher-secret-test-voucher-secret-test-voucher-secret
    default-validity-days: 30
    fraud-velocity-threshold: 3
    fraud-window-seconds: 60
  qr:
    secret: test-qr-secret-test-qr-secret-test-qr-secret-test-qr-secret
    ttl-seconds: 60
  integration:
    mpesa-enabled: false
  invoice:
    prefix: INV

jwt:
  secret: test-jwt-secret-test-jwt-secret-test-jwt-secret-test
  expiration: 86400000

logging:
  level:
    root: WARN
    com.innbucks.loyaltyservice: INFO
