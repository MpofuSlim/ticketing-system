spring:
  # All tests run against real PostgreSQL via Testcontainers (jdbc:tc: URL,
  # ContainerDatabaseDriver) — no H2. Flyway runs the real migrations;
  # Hibernate validates against them. Requires Docker (CI has it).
  # (The dedicated *IT tests still use PostgresIntegrationTestBase /
  # application-it.yaml; this brings the fast unit + controller tests onto
  # the same real-Postgres footing.)
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///loyalty_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

  # The Eureka client is on the classpath now, but tests must not register
  # with a registry; disabling discovery makes the Eureka auto-config back off.
  cloud:
    discovery:
      enabled: false

loyalty:
  voucher:
    secret: test-voucher-secret-test-voucher-secret-test-voucher-secret
    default-validity-days: 30
    fraud-velocity-threshold: 3
    fraud-window-seconds: 60
  qr:
    secret: test-qr-secret-test-qr-secret-test-qr-secret-test-qr-secret
    ttl-seconds: 60
  integration:
    mpesa-enabled: false
  invoice:
    prefix: INV

jwt:
  secret: test-jwt-secret-test-jwt-secret-test-jwt-secret-test
  expiration: 86400000

logging:
  level:
    root: WARN
    com.innbucks.loyaltyservice: INFO
