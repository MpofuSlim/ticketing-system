spring:
  application:
    name: loyalty-service
  # Local & container dev: file-based H2 in MODE=PostgreSQL. Data persists
  # across restarts in ${H2_DATA_DIR}/<service>.mv.db. AUTO_SERVER=TRUE lets
  # an external H2 console connect for debugging. Tests still override these
  # to in-memory H2 via src/test/resources/application-test.yaml.
  datasource:
    url: ${DB_URL:jdbc:h2:file:${H2_DATA_DIR:./data}/loyalty_service;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    hikari:
      pool-name: loyalty-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      # H2 file branch: Hibernate owns the schema (ddl-auto=update keeps the
      # schema in sync with entities and preserves data across restarts).
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

  flyway:
    # Disabled in this branch — Hibernate owns the schema. Set FLYWAY_ENABLED=true
    # if you switch DB_URL back to PostgreSQL and want to re-run db/migration.
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 30s

loyalty:
  voucher:
    secret: ${LOYALTY_VOUCHER_SECRET:change-me-voucher-secret-change-me-voucher-secret}
    default-validity-days: ${LOYALTY_VOUCHER_DEFAULT_VALIDITY_DAYS:365}
    fraud-velocity-threshold: ${LOYALTY_FRAUD_VELOCITY_THRESHOLD:5}
    fraud-window-seconds: ${LOYALTY_FRAUD_WINDOW_SECONDS:60}
  qr:
    secret: ${LOYALTY_QR_SECRET:change-me-qr-secret-change-me-qr-secret-change-me}
    ttl-seconds: ${LOYALTY_QR_TTL_SECONDS:300}
  integration:
    mpesa-enabled: ${LOYALTY_MPESA_ENABLED:false}
  invoice:
    prefix: ${LOYALTY_INVOICE_PREFIX:INV}
  scheduler:
    expiry-cron: ${LOYALTY_EXPIRY_CRON:0 5 * * * *}
    invoice-cron: ${LOYALTY_INVOICE_CRON:0 30 1 * * *}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

server:
  port: ${SERVER_PORT:8086}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"
