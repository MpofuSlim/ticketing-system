spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///event_service_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    discovery:
      enabled: false

jwt:
  secret: test-test-test-test-test-test-test-test
  expiration: 3600000

innbucks:
  tenant-uuid-backfill:
    enabled: false
