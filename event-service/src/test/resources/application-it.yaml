spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  cloud:
    discovery:
      enabled: false

jwt:
  secret: it-jwt-secret-it-jwt-secret-it-jwt-secret-it-jwt-secret
  expiration: 3600000

logging:
  level:
    org.flywaydb: INFO
    org.hibernate.tool.schema: DEBUG
    root: WARN
    com.innbucks.eventservice: INFO
