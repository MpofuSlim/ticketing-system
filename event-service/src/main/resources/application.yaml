spring:
  application:
    name: event-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/event_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: event-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: false
    locations: classpath:db/migration

  # Shared Redis — read side of the cross-service logout denylist only (no
  # Spring Data Redis repositories). Points at the same Redis the gateway /
  # user-service / payment / seat / booking services use.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
      file-size-threshold: 1MB

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}
  # OWASP A02 stage-1 RS256/JWKS dual-verify. When JWT_PUBLIC_KEY is set this
  # service verifies BOTH HS256 and RS256 tokens (alg selected per-token); unset
  # = HS256 only, as before. Set fleet-wide BEFORE user-service flips to RS256
  # minting. PKCS#8/X.509 PEM (-----BEGIN PUBLIC KEY-----).
  public-key: ${JWT_PUBLIC_KEY:}

innbucks:
  country: ${INNBUCKS_COUNTRY:ZW}
  internal-api-token: ${INTERNAL_API_TOKEN:change-me-internal-token-change-me-internal-token}

server:
  port: 8082
  shutdown: graceful
  # Never leak internals to clients on the fallback /error path (stack traces,
  # raw exception messages, binding-error detail). Handled errors already return
  # the ApiResult envelope via GlobalExceptionHandler — incl. field-level
  # validation detail — so this only sanitises the unhandled fallthrough.
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

seat-service:
  base-url: http://seat-service

booking-service:
  base-url: http://booking-service

user-service:
  base-url: http://user-service

resilience4j:
  circuitbreaker:
    instances:
      seatCategories:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      bookingActiveCounts:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      seatCategories:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
      bookingActiveCounts:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{country:-},%X{homeCountry:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"

---
# OWASP A05: backends serve no Swagger/OpenAPI in a deployed cell — the
# gateway hosts the only (auth-gated, fail-closed) copy. Gated on prod; dev/test
# keep docs on for local use.
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
