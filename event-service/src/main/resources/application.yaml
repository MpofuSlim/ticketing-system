spring:
  application:
    name: event-service

  # Tests run on real PostgreSQL via Testcontainers (jdbc:tc: URL in
  # src/test/resources/application-test.yaml + @ActiveProfiles("test"));
  # the main runtime is PostgreSQL too. No H2 anywhere.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/event_service}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: event-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # Schema is owned by Flyway migrations; Hibernate only validates that
      # the JPA model matches the actual columns at boot.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: false
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 30s

  # POST /events accepts a multipart payload (JSON `event` part + optional
  # `eventBanner` image part). Modern phone photos routinely exceed 5MB, so
  # the cap is set to match the 10MB enforced in EventService.MAX_BANNER_BYTES.
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
      file-size-threshold: 1MB

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

innbucks:
  # Shared secret booking-service presents on the internal PATCH
  # /events/{id}/availability/consume call. Same env var as everywhere
  # else in the ticketing stack; ProductionSecretsGuard refuses the
  # `change-me-*` placeholder when SPRING_PROFILES_ACTIVE=prod.
  internal-api-token: ${INTERNAL_API_TOKEN:change-me-change-me-change-me-change-me}

server:
  port: 8082
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

# Resolved from the Eureka registry by service name via the @LoadBalanced
# RestTemplate (see HttpClientConfig). No host:port is configured here any
# more. (The booking default was previously a wrong localhost:8082 —
# event-service's own port — which discovery now sidesteps entirely.)
seat-service:
  base-url: http://seat-service

booking-service:
  base-url: http://booking-service

# user-service is resolved by name via Eureka/LoadBalancer. event-service calls
# its service-to-service tenant-lookup (POST /users/internal/tenants/lookup) to
# attach organizer business details to event responses.
user-service:
  base-url: http://user-service

# Circuit breaker + retry around outbound calls.
#  - seatCategories: SeatCategoryGateway (fallback = empty category list).
#  - bookingActiveCounts: BookingGateway, used to compute availableTickets on
#    every event response. Fallback = empty map, so events fall back to the
#    stored availableTickets value rather than blocking the response.
resilience4j:
  circuitbreaker:
    instances:
      seatCategories:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      bookingActiveCounts:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      seatCategories:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
      bookingActiveCounts:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException

# Service discovery — register with the Eureka registry (discovery-server) and
# resolve sibling services by name. EUREKA_SERVER_URL points at the registry;
# the default targets a local standalone server for laptop dev.
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    # Register by IP — a container's own hostname isn't resolvable by its
    # peers on the shared network. The unique instance-id keeps replicas
    # from colliding in the registry.
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  # Distributed tracing via OTel. Sampling defaults to 10% — flip to 1.0 for
  # debug sessions, leave low in prod for cost. OTLP_ENDPOINT points at the
  # OTel collector / Tempo / Jaeger; default localhost is fine for laptop
  # docker-compose, override in k8s. Set TRACING_ENABLED=false to disable
  # entirely (no spans recorded, no exporter calls).
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}


cors:
  # Comma-separated list of allowed origin patterns. Default is permissive ('*')
  # so dev/Swagger/ngrok/any FE origin works out of the box (matches the gateway
  # and user-service defaults). Safe with allowCredentials=true because
  # SecurityConfig uses setAllowedOriginPatterns (not setAllowedOrigins). MUST
  # be overridden in prod via CORS_ALLOWED_ORIGINS to your real client origins
  # (e.g. https://app.example.com).
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://innvents.vercel.app,https://innbucks-ticketing.vercel.app,http://localhost:[*]}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
