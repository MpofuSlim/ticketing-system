spring:
  application:
    name: event-service

  # H2-only mode: file-based database under ./data so writes survive restart;
  # AUTO_SERVER=TRUE lets a SQL client connect while the app is running. The
  # PostgreSQL config is preserved below (commented) for easy reversal. Tests
  # still use in-memory H2 via src/test/resources/application-test.yaml +
  # @ActiveProfiles("test") for clean isolation between runs.
  datasource:
    url: jdbc:h2:file:./data/event-service;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # --- PostgreSQL (disabled) ---
    # url: ${DB_URL:jdbc:postgresql://localhost:5432/event_service}
    # driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    # username: ${DB_USERNAME:postgres}
    # password: ${DB_PASSWORD}
    hikari:
      pool-name: event-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # H2 in-memory: Hibernate generates the schema on each boot.
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        # --- PostgreSQL dialect (disabled) ---
        # dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  # Flyway migrations are PostgreSQL-flavoured; disabled when running on H2.
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 30s

  h2:
    console:
      enabled: true
      path: /h2-console

  # POST /events accepts a multipart payload (JSON `event` part + optional
  # `eventBanner` image part). Bumped above Spring's 1MB/10MB defaults so the
  # 5MB banner cap enforced in EventService can actually be reached.
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8082
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

seat-service:
  base-url: ${SEAT_SERVICE_BASE_URL:http://localhost:8083}

booking-service:
  base-url: ${BOOKING_SERVICE_BASE_URL:http://localhost:8082}

# Circuit breaker + retry around outbound calls.
#  - seatCategories: SeatCategoryGateway (fallback = empty category list).
#  - bookingActiveCounts: BookingGateway, used to compute availableTickets on
#    every event response. Fallback = empty map, so events fall back to the
#    stored availableTickets value rather than blocking the response.
resilience4j:
  circuitbreaker:
    instances:
      seatCategories:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      bookingActiveCounts:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      seatCategories:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
      bookingActiveCounts:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

cors:
  # Comma-separated list of allowed origin patterns. Default is permissive ('*')
  # so dev/Swagger/ngrok/any FE origin works out of the box (matches the gateway
  # and user-service defaults). Safe with allowCredentials=true because
  # SecurityConfig uses setAllowedOriginPatterns (not setAllowedOrigins). MUST
  # be overridden in prod via CORS_ALLOWED_ORIGINS to your real client origins
  # (e.g. https://app.example.com).
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"
