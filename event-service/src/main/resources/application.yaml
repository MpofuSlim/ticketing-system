spring:
  application:
    name: event-service

  # Local & container dev: file-based H2 in MODE=PostgreSQL. Data persists
  # across restarts in ${H2_DATA_DIR}/event_service.mv.db. AUTO_SERVER=TRUE
  # lets an external H2 console connect for debugging. Tests override these
  # to in-memory H2 via src/test/resources/application-test.yaml.
  datasource:
    url: ${DB_URL:jdbc:h2:file:${H2_DATA_DIR:./data}/event_service;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    hikari:
      pool-name: event-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  jpa:
    hibernate:
      # H2 file branch: Hibernate owns the schema (ddl-auto=update keeps the
      # schema in sync with entities and preserves data across restarts).
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

  flyway:
    # Disabled in this branch — Hibernate owns the schema. Set FLYWAY_ENABLED=true
    # if you switch DB_URL back to PostgreSQL and want to re-run db/migration.
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 30s

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8082
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

seat-service:
  base-url: ${SEAT_SERVICE_BASE_URL:http://localhost:8083}

# Circuit breaker + retry around the outbound call to seat-service
# (SeatCategoryGateway). Fallback returns an empty category list, so events
# remain visible even while seat-service is degraded.
resilience4j:
  circuitbreaker:
    instances:
      seatCategories:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      seatCategories:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

cors:
  # Comma-separated list of allowed origins. Override via CORS_ALLOWED_ORIGINS in prod.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"
