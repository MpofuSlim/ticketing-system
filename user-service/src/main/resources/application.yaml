spring:
  application:
    name: user-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/user_service}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    hikari:
      pool-name: user-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      # Schema is owned by Flyway migrations; Hibernate only validates that
      # the JPA model matches the actual columns at boot.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 30s

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:86400000}

# Cross-service lookup used at login: when a MERCHANT_ADMIN has no loyaltyMerchantId
# on their TenantProfile, AuthService calls loyalty-service to resolve it from the
# user's email (Merchant.admin_email), caches the result, and emits the merchantId
# JWT claim. The shared secret must match loyalty-service's innbucks.internal-api-token.
loyalty-service:
  base-url: ${LOYALTY_SERVICE_URL:http://localhost:8086}
  connect-timeout-ms: ${LOYALTY_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${LOYALTY_SERVICE_READ_TIMEOUT_MS:3000}

innbucks:
  internal-api-token: ${INTERNAL_API_TOKEN:change-me-internal-token-change-me-internal-token}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8081
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 'when-authorized' hides component breakdown from anonymous callers
      # (probes still get UP/DOWN) while letting authenticated tooling debug.
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-}]"
cors:
  # Comma-separated list of allowed origin patterns. Default whitelists the
  # production frontend (innvents.vercel.app), Vercel preview deploys, and
  # any localhost port for dev. Override in prod via CORS_ALLOWED_ORIGINS.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://innvents.vercel.app,https://innbucks-ticketing.vercel.app,https://*.vercel.app,http://localhost:[*]}
