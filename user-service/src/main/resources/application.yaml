spring:
  application:
    name: user-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/user_service}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    hikari:
      pool-name: user-service-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: false
    locations: classpath:db/migration
    placeholders:
      innbucks_country: ${INNBUCKS_COUNTRY:ZW}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
  expiration: ${JWT_EXPIRATION_MS:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# Keyed hash for national IDs at rest (PII). The stored customer_profiles
# .national_id is HMAC-SHA256'd with this secret; the raw value only ever
# travels to core-banking off the registration request. ProductionSecretsGuard
# refuses to boot under prod while this holds the change-me placeholder.
national-id:
  hmac-secret: ${NATIONAL_ID_HMAC_SECRET:change-me-national-id-hmac-secret}

loyalty-service:
  base-url: http://loyalty-service
  connect-timeout-ms: ${LOYALTY_SERVICE_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${LOYALTY_SERVICE_READ_TIMEOUT_MS:3000}

oradian:
  base-url: ${ORADIAN_BASE_URL:http://localhost:8090}
  internal-token: ${ORADIAN_INTERNAL_TOKEN:change-me-internal-token-change-me-internal-token}
  connect-timeout-ms: ${ORADIAN_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${ORADIAN_READ_TIMEOUT_MS:10000}

innbucks-gateway:
  base-url: ${INNBUCKS_GATEWAY_URL:http://localhost:8088}
  connect-timeout-ms: ${INNBUCKS_GATEWAY_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${INNBUCKS_GATEWAY_READ_TIMEOUT_MS:10000}

# InnBucks public notification API (system-user emails). Same API Gateway +
# BANK_API_* credentials as the payment rail (POST /auth/third-party for the
# bearer, X-Api-Key header). Email body is plain text {subject,message,
# reference,destinationEmail}.
innbucks-notify:
  base-url: ${BANK_API_URL:https://staging.innbucks.co.zw}
  api-key: ${BANK_API_KEY:}
  username: ${BANK_API_USERNAME:}
  password: ${BANK_API_PASSWORD:}
  connect-timeout-ms: ${BANK_API_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${BANK_API_READ_TIMEOUT_MS:20000}
  token-ttl: ${BANK_API_TOKEN_TTL:PT8M}

whatsapp:
  base-url: ${WHATSAPP_GATEWAY_URL:http://localhost:8089}
  api-key: ${WHATSAPP_API_KEY:change-me-whatsapp-api-key}
  connect-timeout-ms: ${WHATSAPP_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${WHATSAPP_READ_TIMEOUT_MS:10000}

innbucks:
  country: ${INNBUCKS_COUNTRY:ZW}
  internal-api-token: ${INTERNAL_API_TOKEN:change-me-internal-token-change-me-internal-token}
  cells:
    registry: ${INNBUCKS_CELLS_REGISTRY:{}}
  core-banking:
    provider: ${INNBUCKS_CORE_BANKING:oradian}
  auth-rate-limit:
    login:
      per-identifier-max: ${AUTH_LOGIN_PER_IDENTIFIER_MAX:5}
      per-ip-max: ${AUTH_LOGIN_PER_IP_MAX:20}
      window-seconds: ${AUTH_LOGIN_WINDOW_SECONDS:60}
    refresh:
      per-identifier-max: ${AUTH_REFRESH_PER_IDENTIFIER_MAX:10}
      per-ip-max: ${AUTH_REFRESH_PER_IP_MAX:60}
      window-seconds: ${AUTH_REFRESH_WINDOW_SECONDS:60}

  account-lockout:
    max-attempts: ${ACCOUNT_LOCKOUT_MAX_ATTEMPTS:7}
    duration-minutes: ${ACCOUNT_LOCKOUT_DURATION_MINUTES:30}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8081
  shutdown: graceful
  # Never leak internals to clients on the fallback /error path (stack traces,
  # raw exception messages, binding-error detail). Handled errors already return
  # the ApiResult envelope via GlobalExceptionHandler — incl. field-level
  # validation detail — so this only sanitises the unhandled fallthrough.
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACE_SAMPLE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{country:-},%X{homeCountry:-},%X{traceId:-},%X{spanId:-},%X{correlationId:-}]"
