spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  cloud:
    discovery:
      enabled: false

jwt:
  secret: it-jwt-secret-it-jwt-secret-it-jwt-secret-it-jwt-secret
  expiration: 3600000
  refresh-expiration: 86400000

innbucks:
  internal-api-token: it-internal-token-it-internal-token

oradian:
  base-url: http://oradian.invalid
  internal-token: it-oradian-token
  connect-timeout-ms: 100
  read-timeout-ms: 100

logging:
  level:
    org.flywaydb: INFO
    org.hibernate.tool.schema: DEBUG
    root: WARN
    com.innbucks.userservice: INFO
