spring:
  datasource:
    url: jdbc:h2:mem:user_service_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

jwt:
  secret: test-test-test-test-test-test-test-test
  expiration: 3600000
