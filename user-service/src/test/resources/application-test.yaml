spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///user_service_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    discovery:
      enabled: false

jwt:
  secret: test-test-test-test-test-test-test-test
  expiration: 3600000
  refresh-expiration: 86400000

# Valid Base64 32-byte AES-GCM key so MfaSecretCipher constructs and the
# @SpringBootTest context loads. NOT a real key — test-only.
mfa:
  encryption-key: bWZhLXRlc3Qta2V5LTAwMDAwMDAwMDAwMDAwMDAtMzI=
  issuer: InnBucks-Test
