spring:
  # All tests run against real PostgreSQL via Testcontainers (jdbc:tc: URL,
  # ContainerDatabaseDriver) — no H2. Flyway runs the real migrations;
  # Hibernate validates against them. Requires Docker (CI has it).
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///user_service_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    discovery:
      enabled: false

jwt:
  secret: test-test-test-test-test-test-test-test
  expiration: 3600000
  refresh-expiration: 86400000
