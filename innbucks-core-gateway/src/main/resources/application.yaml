spring:
  application:
    name: innbucks-core-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

server:
  port: ${SERVER_PORT:8088}

eureka:
  client:
    service-url:
      defaultZone: ${INNBUCKS_EUREKA_ZONES:http://127.0.0.1:8761/eureka/}
    register-with-eureka: ${EUREKA_REGISTER:false}
    fetch-registry: true
    eureka-server-connect-timeout-seconds: ${EUREKA_CONNECT_TIMEOUT:5}
    eureka-server-read-timeout-seconds: ${EUREKA_READ_TIMEOUT:5}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
