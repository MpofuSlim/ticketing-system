spring:
  application:
    name: innbucks-core-gateway
  # core puts JPA on the classpath; the adapter has no database, so exclude the
  # datasource/JPA auto-config that would otherwise fail the context at startup.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

server:
  # Own port; override per host (avoid clashing with whatever else runs there).
  port: ${SERVER_PORT:8088}

# InnBucks core platform Eureka. The adapter FETCHES the registry to discover
# messenger-interface + veengu-integration; register-with-eureka is false so it
# does NOT add itself to the InnBucks registry. Flip EUREKA_REGISTER=true
# later if/when InnBucks services need to call back into the adapter.
#
# Default is the host-local registry: in the actual deployment topology the
# core platform's discovery-server runs ON THE SAME EC2 HOST as this adapter
# (/srv/apps/discovery-server, listening on *:8761). The previous default — a
# 5-node public-IP list from the original connectivity spike — went entirely
# dark and cost us an outage: a gateway restart hung in startup cycling dead
# IPs while the registry was on localhost all along (2026-06-11). Override
# INNBUCKS_EUREKA_ZONES only for a deployment where the registry is genuinely
# remote, e.g.:
#   INNBUCKS_EUREKA_ZONES=http://USER:PASS@10.0.1.5:8761/eureka/,http://10.0.1.6:8761/eureka/
eureka:
  client:
    service-url:
      defaultZone: ${INNBUCKS_EUREKA_ZONES:http://127.0.0.1:8761/eureka/}
    register-with-eureka: ${EUREKA_REGISTER:false}
    fetch-registry: true
    # Fail fast-ish if the cluster is unreachable, so logs show the problem
    # instead of hanging on long default timeouts.
    eureka-server-connect-timeout-seconds: ${EUREKA_CONNECT_TIMEOUT:5}
    eureka-server-read-timeout-seconds: ${EUREKA_READ_TIMEOUT:5}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
