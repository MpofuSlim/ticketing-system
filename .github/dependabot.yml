version: 2
updates:

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    target-branch: "master"
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      spring-ecosystem:
        patterns:
          - "org.springframework*"
          - "org.springframework.boot*"
          - "org.springframework.cloud*"
          - "org.springframework.security*"
        update-types: ["minor", "patch"]
      jackson:
        patterns:
          - "com.fasterxml.jackson*"
          - "tools.jackson*"
        update-types: ["minor", "patch"]
      netty:
        patterns:
          - "io.netty*"
        update-types: ["minor", "patch"]
      testcontainers:
        patterns:
          - "org.testcontainers*"
        update-types: ["minor", "patch"]
      observability:
        patterns:
          - "io.micrometer*"
          - "io.opentelemetry*"
          - "io.sentry*"
          - "net.logstash.logback*"
        update-types: ["minor", "patch"]

  # innbucks-core-gateway is a Spring Boot 3.2.4 connectivity spike that is NOT
  # a module of the Boot-4 reactor, so the "/" Maven config above never sees it
  # and it is built/scanned by nothing (no Dockerfile -> not in the Release
  # Trivy scan; not a reactor module -> not in CI). GitHub's repo-wide
  # dependency graph still feeds Dependabot security ALERTS for its pom, and the
  # CI dependency-review gate covers it on PRs — this entry adds proactive
  # version-update PRs so the EOL Boot 3.2.4 line gets nudged forward (OWASP
  # A08). Note: if Dependabot can't resolve the private innbucks.co.zw:core jar,
  # this directory's update run may log a resolution error (harmless to other
  # ecosystems) — the real fix is to upgrade-or-retire the spike.
  - package-ecosystem: "maven"
    directory: "/innbucks-core-gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    target-branch: "master"
    labels:
      - "dependencies"
      - "java"
      - "core-gateway-spike"
    commit-message:
      prefix: "deps(core-gateway)"

  - package-ecosystem: "docker"
    directory: "/api-gateway"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(api-gateway)" }

  - package-ecosystem: "docker"
    directory: "/user-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(user-service)" }

  - package-ecosystem: "docker"
    directory: "/event-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(event-service)" }

  - package-ecosystem: "docker"
    directory: "/seat-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(seat-service)" }

  - package-ecosystem: "docker"
    directory: "/booking-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(booking-service)" }

  - package-ecosystem: "docker"
    directory: "/payment-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(payment-service)" }

  - package-ecosystem: "docker"
    directory: "/loyalty-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(loyalty-service)" }

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      docker-actions:
        patterns:
          - "docker/*"
