version: 2
updates:

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    target-branch: "master"
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      spring-ecosystem:
        patterns:
          - "org.springframework*"
          - "org.springframework.boot*"
          - "org.springframework.cloud*"
          - "org.springframework.security*"
        update-types: ["minor", "patch"]
      jackson:
        patterns:
          - "com.fasterxml.jackson*"
          - "tools.jackson*"
        update-types: ["minor", "patch"]
      netty:
        patterns:
          - "io.netty*"
        update-types: ["minor", "patch"]
      testcontainers:
        patterns:
          - "org.testcontainers*"
        update-types: ["minor", "patch"]
      observability:
        patterns:
          - "io.micrometer*"
          - "io.opentelemetry*"
          - "io.sentry*"
          - "net.logstash.logback*"
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directory: "/api-gateway"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(api-gateway)" }

  - package-ecosystem: "docker"
    directory: "/user-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(user-service)" }

  - package-ecosystem: "docker"
    directory: "/event-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(event-service)" }

  - package-ecosystem: "docker"
    directory: "/seat-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(seat-service)" }

  - package-ecosystem: "docker"
    directory: "/booking-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(booking-service)" }

  - package-ecosystem: "docker"
    directory: "/payment-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(payment-service)" }

  - package-ecosystem: "docker"
    directory: "/loyalty-service"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Etc/UTC" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "docker(loyalty-service)" }

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      docker-actions:
        patterns:
          - "docker/*"
