name: Dependabot auto-merge

# Auto-merge patch-only Dependabot PRs. The flow:
#   1. Dependabot opens a PR.
#   2. This workflow inspects the PR's update-type metadata.
#   3. If patch-only AND opened by dependabot[bot], it approves and
#      enables GitHub's `--auto` merge.
#   4. GitHub then waits for all required status checks (the Release
#      workflow's build/scan, the test job, anything else gated by
#      branch protection) before actually merging.
#
# Anything other than a patch — minor, major, or unknown — falls
# through untouched and waits for human review. Same for grouped PRs
# where the highest bump in the group is minor or major.
#
# pull_request_target (not pull_request) is needed so we get write
# permissions on the base repo. It does NOT checkout PR code, so the
# common pull_request_target pitfall (executing untrusted code with
# secrets) doesn't apply here.
#
# Heads-up: this only does anything if "Allow auto-merge" is enabled
# in Settings -> General -> Pull Requests for the repo. GitHub silently
# no-ops `gh pr merge --auto` otherwise.

on:
  pull_request_target:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve patch update
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge on patch update
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --squash keeps master's history one-commit-per-PR;
        # --auto queues the merge until required checks pass rather
        # than merging immediately, which is what makes this safe.
        run: gh pr merge --auto --squash "$PR_URL"
