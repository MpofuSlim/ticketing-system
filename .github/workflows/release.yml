name: Release

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    paths:
      - "**/Dockerfile"
      - ".dockerignore"
      - ".github/workflows/release.yml"
      - "**/pom.xml"
      - "mvnw"
      - ".mvn/**"
      - "docker-compose.yml"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  # OWASP A08 — build/artifact integrity. id-token lets the runner mint a
  # short-lived OIDC token for keyless signing; attestations lets it store the
  # SLSA build-provenance attestation. Both are only exercised on push (image
  # signing below is guarded off for pull_request events).
  id-token: write
  attestations: write

jobs:
  build:
    name: Build, scan, push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - discovery-server
          - api-gateway
          - user-service
          - event-service
          - seat-service
          - booking-service
          - payment-service
          - loyalty-service

    steps:
      # Third-party actions pinned to immutable commit SHAs (OWASP A08 —
      # supply-chain integrity); dependabot keeps the SHA + version comment in
      # sync. Never downgrade a pin back to a floating tag.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=ref,event=pr

      # Build into the local docker daemon (load) WITHOUT pushing, so Trivy can
      # scan the exact image before it ever leaves the runner. Provenance/SBOM
      # attestations are NOT set here: they require the registry (image)
      # exporter, which is incompatible with `load: true` (docker exporter).
      # The push step below re-runs the build from the gha cache (near-instant)
      # with attestations enabled.
      - name: Build image (load for scanning, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      # Gate: scan the LOADED local image and fail the job on any CRITICAL/HIGH
      # (os + library) before the push step runs. Previously the push happened
      # in the same step as the build, so a failing scan only ran AFTER the
      # image was already in GHCR; scanning first makes Trivy an actual push
      # gate (OWASP A08 — don't publish a known-vulnerable artifact).
      - name: Scan image with Trivy
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          trivy image \
            --severity CRITICAL,HIGH \
            --vuln-type os,library \
            --exit-code 1 \
            --no-progress \
            --ignorefile .trivyignore \
            "$IMAGE"

      # Push only after the scan passes, and attach a signed SLSA provenance
      # attestation + an SBOM to the image in the registry (OWASP A08 —
      # verifiable build provenance / what-built-this). Cache-served from the
      # build step above, so this is fast. Skipped on pull_request.
      - name: Push image + attach provenance & SBOM
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          provenance: mode=max
          sbom: true

      # GitHub-native SLSA build-provenance attestation, signed keylessly via
      # the runner's OIDC identity and stored in GitHub (no external public
      # transparency log). Lets anyone verify an image digest was built by THIS
      # repo's workflow: `gh attestation verify oci://ghcr.io/<owner>/<svc>@<digest>`.
      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        || github.event_name == 'workflow_dispatch'
    concurrency:
      group: ec2-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout (for docker-compose.yml + scripts/)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync compose + scripts to EC2
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            docker-compose.yml scripts/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/superApp/

      - name: Pull pinned images + bring the stack up
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' \
             GHCR_USER='${{ github.actor }}' \
             IMAGE_TAG='sha-${{ github.sha }}' \
             bash -s" <<'EOF'
            set -euo pipefail

            docker network inspect innbucks-shared >/dev/null 2>&1 \
              || docker network create innbucks-shared

            cd ~/superApp
            if [ ! -f .env ]; then
              echo "::error::.env missing on EC2 — create ~/superApp/.env first"
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_TAG
            echo "Pulling images at tag $IMAGE_TAG ..."
            docker compose --profile payments pull

            echo "Restarting stack ..."
            docker compose --profile payments up -d --no-build --remove-orphans --wait

            docker logout ghcr.io

            echo
            echo "Final state:"
            docker compose --profile payments ps
          EOF

      - name: Wipe SSH key from the runner
        if: always()
        run: rm -f ~/.ssh/deploy_key
