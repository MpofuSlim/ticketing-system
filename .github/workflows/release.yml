name: Release

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    paths:
      - "**/Dockerfile"
      - ".dockerignore"
      - ".github/workflows/release.yml"
      - "**/pom.xml"
      - "mvnw"
      - ".mvn/**"
      - "docker-compose.yml"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  # OWASP A08 — build/artifact integrity. id-token lets the runner mint a
  # short-lived OIDC token for keyless signing; attestations lets it store the
  # SLSA build-provenance attestation. Both are only exercised on push (image
  # signing below is guarded off for pull_request events).
  id-token: write
  attestations: write

jobs:
  build:
    name: Build, scan, push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Throttle concurrent OIDC id-token requests. When all matrix legs hit
      # GitHub's identity-token endpoint at once, the attestation step below
      # intermittently fails ("error retrieving identity token / no tokens
      # available") — with 8 legs we saw ~4 fail per run. Capping parallelism
      # halves the contention; paired with the retry on the attestation step
      # for defence in depth. Release is a post-merge pipeline, so the extra
      # wall-clock of running in waves is an acceptable trade for a green,
      # fully-attested build.
      max-parallel: 4
      matrix:
        service:
          - discovery-server
          - api-gateway
          - user-service
          - event-service
          - seat-service
          - booking-service
          - payment-service
          - loyalty-service

    steps:
      # Third-party actions pinned to immutable commit SHAs (OWASP A08 —
      # supply-chain integrity); dependabot keeps the SHA + version comment in
      # sync. Never downgrade a pin back to a floating tag.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=ref,event=pr

      # Build into the local docker daemon (load) WITHOUT pushing, so Trivy can
      # scan the exact image before it ever leaves the runner. Provenance/SBOM
      # attestations are NOT set here: they require the registry (image)
      # exporter, which is incompatible with `load: true` (docker exporter).
      # The push step below re-runs the build from the gha cache (near-instant)
      # with attestations enabled.
      - name: Build image (load for scanning, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      # A08 supply-chain: install Trivy from an IMMUTABLE version tag, never the
      # mutable `main` branch. This job holds packages:write + id-token:write +
      # attestations:write, so remote code piped to a shell here could push
      # malicious images and mint valid provenance attestations for them. Pin
      # both the installer script ref AND the installed version; bump
      # deliberately (Dependabot doesn't track this raw curl).
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.69.3"
        run: |
          curl -sSfL "https://raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/install.sh" \
            | sudo sh -s -- -b /usr/local/bin "v${TRIVY_VERSION}"

      # Gate: scan the LOADED local image and fail the job on any CRITICAL/HIGH
      # (os + library) before the push step runs. Previously the push happened
      # in the same step as the build, so a failing scan only ran AFTER the
      # image was already in GHCR; scanning first makes Trivy an actual push
      # gate (OWASP A08 — don't publish a known-vulnerable artifact).
      - name: Scan image with Trivy
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          trivy image \
            --severity CRITICAL,HIGH \
            --vuln-type os,library \
            --exit-code 1 \
            --no-progress \
            --ignorefile .trivyignore \
            "$IMAGE"

      # Push only after the scan passes, and attach a signed SLSA provenance
      # attestation + an SBOM to the image in the registry (OWASP A08 —
      # verifiable build provenance / what-built-this). Cache-served from the
      # build step above, so this is fast. Skipped on pull_request.
      - name: Push image + attach provenance & SBOM
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          provenance: mode=max
          sbom: true

      # GitHub-native SLSA build-provenance attestation, signed keylessly via
      # the runner's OIDC identity and stored in GitHub (no external public
      # transparency log). Lets anyone verify an image digest was built by THIS
      # repo's workflow: `gh attestation verify oci://ghcr.io/<owner>/<svc>@<digest>`.
      #
      # Retry wrapper: fetching the OIDC identity token intermittently fails
      # under matrix concurrency ("error retrieving identity token / no tokens
      # available"). The first attempt runs with continue-on-error so a
      # transient blip doesn't fail the job outright; the second attempt (only
      # when the first failed) refetches the token and near-always succeeds.
      # The RETRY step has NO continue-on-error, so a genuine attestation
      # failure still fails the job — the OWASP A08 provenance guarantee is
      # preserved, not weakened.
      - name: Attest build provenance
        id: attest
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest build provenance (retry on transient OIDC failure)
        if: github.event_name != 'pull_request' && steps.attest.outcome == 'failure'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
