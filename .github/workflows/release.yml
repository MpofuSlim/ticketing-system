name: Release

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    paths:
      - "**/Dockerfile"
      - ".dockerignore"
      - ".github/workflows/release.yml"
      - "**/pom.xml"
      - "mvnw"
      - ".mvn/**"
      - "docker-compose.yml"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build, scan, push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - discovery-server
          - api-gateway
          - user-service
          - event-service
          - seat-service
          - booking-service
          - payment-service
          - loyalty-service

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          load: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Scan image with Trivy
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          trivy image \
            --severity CRITICAL,HIGH \
            --vuln-type os,library \
            --exit-code 1 \
            --no-progress \
            --ignorefile .trivyignore \
            "$IMAGE"

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        || github.event_name == 'workflow_dispatch'
    concurrency:
      group: ec2-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout (for docker-compose.yml + scripts/)
        uses: actions/checkout@v7

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync compose + scripts to EC2
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            docker-compose.yml scripts/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/superApp/

      - name: Pull pinned images + bring the stack up
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' \
             GHCR_USER='${{ github.actor }}' \
             IMAGE_TAG='sha-${{ github.sha }}' \
             bash -s" <<'EOF'
            set -euo pipefail

            docker network inspect innbucks-shared >/dev/null 2>&1 \
              || docker network create innbucks-shared

            cd ~/superApp
            if [ ! -f .env ]; then
              echo "::error::.env missing on EC2 — create ~/superApp/.env first"
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_TAG
            echo "Pulling images at tag $IMAGE_TAG ..."
            docker compose --profile payments pull

            echo "Restarting stack ..."
            docker compose --profile payments up -d --no-build --remove-orphans --wait

            docker logout ghcr.io

            echo
            echo "Final state:"
            docker compose --profile payments ps
          EOF

      - name: Wipe SSH key from the runner
        if: always()
        run: rm -f ~/.ssh/deploy_key
