name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  qodana:
    runs-on: ubuntu-latest
    # Least privilege (OWASP A08). push-fixes is 'none' below, so Qodana never
    # commits — contents:read is enough. It still needs pull-requests:write for
    # post-pr-comment and checks:write for use-annotations.
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      # SHA-pinned (OWASP A08 supply-chain integrity); dependabot maintains the
      # pin + version comment.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@4861e015da555e86a72b862892aba6c2b93e6891 # v2026.1.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          upload-result: false
          push-fixes: 'none'
