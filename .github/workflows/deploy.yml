name: Deploy to EC2

# Triggers:
#   - Automatic on every push to master (post-merge) — the canonical "ship it"
#     path. Matches the existing PR-merge workflow.
#   - Manual via the Actions tab — handy for re-deploying after fixing a .env
#     value on the EC2 without forcing a fresh commit.
#
# The deploy target (host + SSH user + private key) lives entirely in
# repository secrets, so this file is safe to read by anyone with code access.

on:
  push:
    branches: [master]
  workflow_dispatch:

# A second deploy starting while the first is still running would produce a
# half-old / half-new state on the EC2 (rsync mid-flight, docker compose
# rebuilding). Serialise on the deploy target instead — first one finishes,
# second one runs after.
concurrency:
  group: ec2-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        # Private key from secrets -> ~/.ssh/deploy_key, locked to 600 so SSH
        # accepts it. ssh-keyscan pre-populates known_hosts so the first SSH
        # doesn't have to interactively confirm the host fingerprint.
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync repo to EC2
        # --delete cleans up files removed from the repo (a renamed Dockerfile
        # doesn't leave a stale copy behind). EXCLUDES below protect three
        # things on the EC2 that MUST NOT be wiped:
        #   .env       — production secrets, lives only on the server
        #   target/    — Maven build output, regenerated on next compose up
        #   .git       — not deployed; we sync the checkout, not the repo
        # node_modules / *.iml / .idea are dev artefacts that shouldn't ride
        # the wire but won't hurt anything if they did.
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='target/' \
            --exclude='*/target/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.idea/' \
            --exclude='*.iml' \
            --exclude='.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/superApp/

      - name: Ensure shared docker network exists, then bring up the stack
        # Heredoc with quoted EOF — the body runs verbatim on the EC2, no
        # variable interpolation on the runner side.
        # The shared `innbucks-shared` docker network lets this stack talk
        # to the OradianMiddleware stack (deployed separately) by service
        # name. `docker network create` errors if it already exists, so
        # we inspect-first; safe to run on every deploy.
        # Refuse to start if .env is missing (a first-time deploy on a
        # fresh EC2 with no .env would otherwise produce confusing
        # "POSTGRES_PASSWORD not set" errors from docker compose).
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} <<'EOF'
            set -e
            docker network inspect innbucks-shared >/dev/null 2>&1 \
              || docker network create innbucks-shared
            cd ~/superApp
            if [ ! -f .env ]; then
              echo "::error::.env missing on EC2 — create ~/superApp/.env from .env.example first"
              exit 1
            fi
            echo "Bringing the stack up (--build rebuilds any service whose source changed) ..."
            docker compose up -d --build --remove-orphans
            echo
            echo "Final state:"
            docker compose ps
          EOF

      - name: Wipe SSH key from the runner
        # Best-effort cleanup. The runner is ephemeral but explicit is better.
        if: always()
        run: rm -f ~/.ssh/deploy_key
