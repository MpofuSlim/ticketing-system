name: CI

on:
  pull_request:
    branches: [ "master" ]
  push:
    # Every push to master AND every push to a feature branch (claude/* and
    # the conventional develop/feature/release prefixes) runs CI. Without this
    # filter only master was tested — the active development branches went
    # completely ungated. Concurrency group below kills stale runs as soon as
    # a new push lands, so the wider trigger doesn't burn CI minutes.
    branches:
      - "master"
      - "develop"
      - "claude/**"
      - "feature/**"
      - "release/**"
      - "hotfix/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # The Maven Wrapper fetches the Maven distribution from Maven Central on
      # first use. Cache it (keyed on the pinned version) so most runs skip that
      # download — a transient Maven Central blip during this bootstrap was
      # failing the whole job in seconds, before any code was compiled.
      - name: Cache Maven wrapper distribution
        uses: actions/cache@v5
        with:
          path: ~/.m2/wrapper
          key: ${{ runner.os }}-maven-wrapper-${{ hashFiles('.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-maven-wrapper-

      # Download Maven (if not cached) with retries, so a transient network
      # failure fetching the distribution is retried rather than failing the
      # build. Only the *download* is retried — `verify` below runs exactly
      # once, so real compile/test failures still fail the job.
      - name: Bootstrap Maven wrapper (retry transient downloads)
        run: |
          for attempt in 1 2 3; do
            ./mvnw -B -ntp -version && exit 0
            echo "Maven wrapper bootstrap attempt ${attempt} failed; retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "::error::Maven wrapper bootstrap failed after 3 attempts (transient Maven Central download issue)."
          exit 1

      # `verify` runs Surefire (unit) + Failsafe (integration *IT.java) and
      # any plugin bound to verify/post-verify (e.g. SpotBugs, JaCoCo coverage
      # thresholds when wired). `test` only runs Surefire, so the loyalty-service
      # Testcontainers ITs and any future *IT classes wouldn't gate merges.
      # -Dspring-boot.run.skip avoids the spring-boot-maven-plugin run goal
      # firing during verify; -ntp drops the noisy "downloading from central"
      # log lines that bloat the action output.
      - name: Build + test + integration-test
        run: ./mvnw -B -ntp verify
