name: CI

on:
  pull_request:
    branches: [ "master" ]
  push:
    # Every push to master AND every push to a feature branch (claude/* and
    # the conventional develop/feature/release prefixes) runs CI. Without this
    # filter only master was tested — the active development branches went
    # completely ungated. Concurrency group below kills stale runs as soon as
    # a new push lands, so the wider trigger doesn't burn CI minutes.
    branches:
      - "master"
      - "develop"
      - "claude/**"
      - "feature/**"
      - "release/**"
      - "hotfix/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # `verify` runs Surefire (unit) + Failsafe (integration *IT.java) and
      # any plugin bound to verify/post-verify (e.g. SpotBugs, JaCoCo coverage
      # thresholds when wired). `test` only runs Surefire, so the loyalty-service
      # Testcontainers ITs and any future *IT classes wouldn't gate merges.
      # -Dspring-boot.run.skip avoids the spring-boot-maven-plugin run goal
      # firing during verify; -ntp drops the noisy "downloading from central"
      # log lines that bloat the action output.
      - name: Build + test + integration-test
        run: ./mvnw -B -ntp verify
