name: CI

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches:
      - "master"
      - "develop"
      - "claude/**"
      - "feature/**"
      - "release/**"
      - "hotfix/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache Maven wrapper distribution
        uses: actions/cache@v5
        with:
          path: ~/.m2/wrapper
          key: ${{ runner.os }}-maven-wrapper-${{ hashFiles('.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-maven-wrapper-

      - name: Bootstrap Maven wrapper (retry transient downloads)
        run: |
          for attempt in 1 2 3; do
            ./mvnw -B -ntp -version && exit 0
            echo "Maven wrapper bootstrap attempt ${attempt} failed; retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          echo "::error::Maven wrapper bootstrap failed after 3 attempts (transient Maven Central download issue)."
          exit 1

      - name: Build + test + integration-test
        run: ./mvnw -B -ntp verify

      - name: Summarise JaCoCo coverage per module
        if: always()
        run: |
          {
            echo "## JaCoCo coverage"
            echo ""
            echo "| Module | Line % | Branch % | Method % |"
            echo "|--------|-------:|---------:|---------:|"
            for xml in $(find . -path '*/target/site/jacoco/jacoco.xml' | sort); do
              module=$(echo "$xml" | sed 's|^\./||;s|/target.*||')
              pcts=$(python3 - "$xml" <<'PY'
          import sys, xml.etree.ElementTree as ET
          root = ET.parse(sys.argv[1]).getroot()
          out = {}
          for c in root.findall('counter'):
              t, m, cv = c.get('type'), int(c.get('missed')), int(c.get('covered'))
              total = m + cv
              out[t] = f"{100*cv/total:.1f}" if total else "n/a"
          print(f"{out.get('LINE','n/a')}|{out.get('BRANCH','n/a')}|{out.get('METHOD','n/a')}")
          PY
              )
              line=$(echo "$pcts" | cut -d'|' -f1)
              branch=$(echo "$pcts" | cut -d'|' -f2)
              method=$(echo "$pcts" | cut -d'|' -f3)
              echo "| ${module} | ${line} | ${branch} | ${method} |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload JaCoCo HTML + XML reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage
          path: '**/target/site/jacoco/**'
          if-no-files-found: warn
          retention-days: 14
